# Generic sim-to-real training and evaluation pipeline.
# Credentials are supplied at launch through environment/secret injection; do
# not write access keys or tokens into this file.
name: sim-to-real-pipeline
resources:
  cloud: kubernetes
  accelerators:
    - H100:1
    - H200:1
    - L40S:1
  cpus: 16+
  memory: 64+
envs:
  NPA_SIM_TO_REAL_RUN_ID: "<your-run-id>"
  S3_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  NEBIUS_S3_ENDPOINT: "https://storage.eu-north1.nebius.cloud"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  # Supply AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY at launch time.
  S3_BUCKET: "${S3_BUCKET}"
  NPA_S3_BUCKET: "${S3_BUCKET}"
  S3_PREFIX: "sim-to-real/<your-run-id>"
  PIPELINE_ROOT_URI: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/"
  INPUT_DATA_URI: "s3://${S3_BUCKET}/datasets/lerobot-pusht/"
  LEROBOT_DATASET_URI: "s3://${S3_BUCKET}/datasets/lerobot-pusht/"
  LEROBOT_DATASET_REPO_ID: "lerobot/pusht"
  LEROBOT_DATASET_REVISION: "7628202a2180972f291ba1bc6723834921e72c19"
  RAW_ENVS_URI: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/raw-envs/"
  TRAIN_ENVS_URI: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/splits/train/"
  HELDOUT_ENVS_URI: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/splits/heldout/"
  POLICY_IMAGE: "npa-lerobot-policy:0.1.0"
  CHECKPOINT_URI: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/checkpoints/policy/"
  RERUN_RRD_PATH: "s3://${S3_BUCKET}/sim-to-real/<your-run-id>/viz/sim-to-real.rrd"
  SIM_BACKEND: "genesis"
  EVAL_BACKEND: "state-success"
  FEEDBACK_SOURCE: "sim-env"
  FEEDBACK_TYPE: "scalar"
  NPA_GPU_TYPE: "H100:1"
  NPA_GPU_FAILOVER: "H200:1,L40S:1"
  GPU: "H100:1,H200:1,L40S:1"
  BYO_FEEDBACK_ENDPOINT_URL: ""
  BYO_FEEDBACK_COMMAND: ""
  BYO_FEEDBACK_MODE: "provided-rollout"
  VLM_EVAL_BACKEND: "stub"
  VLM_EVAL_MODEL: "vlm-eval-stub"
  VLM_EVAL_ENDPOINT_URL: ""
  VLM_EVAL_FRAME_SELECTION: "keyframes"
  VLM_EVAL_MAX_FRAMES: "4"
  VLM_EVAL_SCORE: ""
  SPLIT_FRACTION: "0.8"
  ENV_COUNT: "10"
  EPISODES: "4"
  TRAIN_STEPS: "2000"
  EVAL_EPISODES: "10"
  MAX_TRAINING_ITERATIONS: "3"
  TRAIN_STEP_BUDGET: "6000"
  MIN_EVAL_IMPROVEMENT: "0.0"
  POLICY_TYPE: "act"
  TRAIN_BATCH_SIZE: "8"
  TRAIN_NUM_WORKERS: "4"
  POLICY_DEVICE: "cuda"
  SUCCESS_THRESHOLD: "0.75"
  SEED: "42"
  CUSTOM_LEROBOT_TRAINER_COMMAND: ""
  RERUN_MAX_FRAMES_PER_EPISODE: "32"
setup: |
  set -e
  if [ -d ./npa ]; then
    python3 -m venv ./npa/.venv
    ./npa/.venv/bin/python -m pip install --upgrade pip setuptools wheel
    ./npa/.venv/bin/python -m pip install -e ./npa
  else
    echo "Expected SkyPilot workdir to contain ./npa" >&2
    exit 2
  fi
  ./npa/.venv/bin/python -m pip install "lerobot[pusht]==0.5.1" safetensors huggingface_hub datasets
  ./npa/.venv/bin/python -m npa.workbench.lerobot.policy_container check-import
run: |
  set -euo pipefail

  report_dir="/tmp/npa-sim-to-real-${NPA_SIM_TO_REAL_RUN_ID}"
  mkdir -p "${report_dir}"

  ./npa/.venv/bin/python -m npa.workflows.sim_to_real real-loop \
    --run-id "${NPA_SIM_TO_REAL_RUN_ID}" \
    --s3-endpoint "${S3_ENDPOINT_URL}" \
    --s3-bucket "${S3_BUCKET}" \
    --s3-prefix "${S3_PREFIX}" \
    --input-data-uri "${INPUT_DATA_URI}" \
    --dataset-repo-id "${LEROBOT_DATASET_REPO_ID}" \
    --dataset-revision "${LEROBOT_DATASET_REVISION}" \
    --policy-image "${POLICY_IMAGE}" \
    --sim-backend "${SIM_BACKEND}" \
    --eval-backend "${EVAL_BACKEND}" \
    --feedback-source "${FEEDBACK_SOURCE}" \
    --feedback-type "${FEEDBACK_TYPE}" \
    --vlm-eval-backend "${VLM_EVAL_BACKEND}" \
    --vlm-eval-model "${VLM_EVAL_MODEL}" \
    --vlm-eval-endpoint-url "${VLM_EVAL_ENDPOINT_URL}" \
    --vlm-eval-frame-selection "${VLM_EVAL_FRAME_SELECTION}" \
    --vlm-eval-max-frames "${VLM_EVAL_MAX_FRAMES}" \
    --split-fraction "${SPLIT_FRACTION}" \
    --env-count "${ENV_COUNT}" \
    --episodes "${EPISODES}" \
    --train-steps "${TRAIN_STEPS}" \
    --eval-episodes "${EVAL_EPISODES}" \
    --max-training-iterations "${MAX_TRAINING_ITERATIONS}" \
    --train-step-budget "${TRAIN_STEP_BUDGET}" \
    --min-eval-improvement "${MIN_EVAL_IMPROVEMENT}" \
    --policy-type "${POLICY_TYPE}" \
    --train-batch-size "${TRAIN_BATCH_SIZE}" \
    --train-num-workers "${TRAIN_NUM_WORKERS}" \
    --policy-device "${POLICY_DEVICE}" \
    --threshold "${SUCCESS_THRESHOLD}" \
    --seed "${SEED}" \
    --gpu "${NPA_GPU_TYPE}" \
    --gpu-failover "${NPA_GPU_FAILOVER}" \
    --trainer-command "${CUSTOM_LEROBOT_TRAINER_COMMAND}" \
    --byo-feedback-endpoint-url "${BYO_FEEDBACK_ENDPOINT_URL}" \
    --byo-feedback-command "${BYO_FEEDBACK_COMMAND}" \
    --byo-feedback-mode "${BYO_FEEDBACK_MODE}" \
    --checkpoint-uri "${CHECKPOINT_URI}" \
    --rrd-path "${RERUN_RRD_PATH}" \
    --rerun-max-frames-per-episode "${RERUN_MAX_FRAMES_PER_EPISODE}" \
    --output-dir "${report_dir}" \
    --attempt-s3-roundtrip
