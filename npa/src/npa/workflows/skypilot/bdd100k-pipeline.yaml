  DETECTION_TRAINING_ENDPOINT: http://npa-detection-training.workbench.svc.cluster.local:8790
  DETECTION_TRAINING_TOKEN: ""
  NEBIUS_S3_ENDPOINT: https://storage.eu-north1.nebius.cloud
  WRITE_CANONICAL_EVAL_METRICS: "1"
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${DETECTION_TRAINING_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${DETECTION_TRAINING_TOKEN}")
  fi

  get_detection() {
    local path="$1"
    local output="$2"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}${path}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  post_detection() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${DETECTION_TRAINING_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}/health" | jq -e '.status == "ok"'
  get_detection "/runs" runs.json
  pattern=$(jq -r --arg slug "/training/${VIEW_SLUG}/" '[.runs[] | select(.status == "completed" and (.checkpoint_uri_pattern | contains($slug)))] | last | .checkpoint_uri_pattern // ""' runs.json)
  epochs=$(jq -r --arg slug "/training/${VIEW_SLUG}/" '[.runs[] | select(.status == "completed" and (.checkpoint_uri_pattern | contains($slug)))] | last | .total_epochs // ""' runs.json)
  if [[ -z "${pattern}" || -z "${epochs}" ]]; then
    echo "No completed training run found for ${VIEW_NAME}" >&2
    cat runs.json >&2
    exit 1
  fi
  checkpoint_uri=$(printf "%s" "${pattern}" | sed "s/{epoch}/${epochs}/g")
  payload=$(jq -n \
    --arg checkpoint_uri "${checkpoint_uri}" \
    --arg eval_view "${VIEW_NAME}" \
    --arg lance_uri "${LANCE_URI}" \
    --arg output_uri "${EVAL_OUTPUT_URI}" \
    '{checkpoint_uri: $checkpoint_uri, eval_view: $eval_view, lance_uri: $lance_uri, output_uri: $output_uri}')
  post_detection "/eval" "${payload}" eval-response.json
  jq -e '(.mAP | type == "number") and (.mAP_50 | type == "number") and (.mAP_75 | type == "number")' eval-response.json
  if [[ "${WRITE_CANONICAL_EVAL_METRICS}" == "1" ]] && command -v aws >/dev/null 2>&1; then
    aws s3 cp eval-response.json "${EVAL_OUTPUT_URI%/}/metrics.json" --endpoint-url "${NEBIUS_S3_ENDPOINT}"
  fi
