name: Image Security Scan

on:
  pull_request:
    paths:
      - "npa/docker/workbench/**"
      - "**/Dockerfile*"
      - ".github/workflows/image-security-scan.yml"
  push:
    branches:
      - main
  schedule:
    # Weekly scan catches newly-disclosed CVEs in existing pinned bases.
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  tag-strategy-check:
    name: Two-tag strategy consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python -m pip install PyYAML

      - name: Run tag consistency check
        run: python npa/docker/workbench/check_tag_consistency.py

  dockerfile-static-scan:
    name: Static Dockerfile scan (Trivy config)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: "."
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Trivy config scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: "."
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-config.sarif

      - name: Upload config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  base-image-cve-scan:
    name: Base image CVE scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nvidia-cuda-12-4-1-devel-ubuntu22-04
            image: nvidia/cuda:12.4.1-devel-ubuntu22.04@sha256:da6791294b0b04d7e65d87b7451d6f2390b4d36225ab0701ee7dfec5769829f5
          - name: nvidia-cuda-12-6-3-devel-ubuntu22-04
            image: nvidia/cuda:12.6.3-devel-ubuntu22.04@sha256:d49bb8a4ff97fb5fe477947a3f02aa8c0a53eae77e11f00ec28618a0bcaa2ad1
          - name: nvidia-cuda-12-8-1-cudnn-devel-ubuntu22-04
            image: nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04@sha256:ad6d59a3bbf3e82c1c849c9ac09cfc2a3e0bbb8655042fd899be6681b3fe2a85
          - name: python-3-11-slim-bookworm
            image: python:3.11-slim-bookworm@sha256:cd67330292a51e2963156f74ff340455d66b2172e9190e99f40dff9357471177
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Trivy image scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.name }}.sarif

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}
