apiVersion: npa.workflow/v0.0.1
kind: Workflow
metadata:
  name: byof-droid-policy-learning
  description: >
    Registry-candidate BYOF workflow for DROID policy learning, pinned to a
    reviewed commit and smoke-tested through the documented RLDS config
    generation/import path.
config:
  bucket: example-bucket
  repo_url: "https://github.com/droid-dataset/droid_policy_learning.git"
  repo_ref: "9a29c832b4c81bf38401111f5e4cdddaca217581"
  base_profile: ubuntu
  base_image: "nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"
  build_command: >
    apt-get update &&
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
    python3 python3-pip python3-venv git &&
    python3 -m pip install --no-cache-dir --upgrade pip &&
    python3 -m pip install --no-cache-dir -e .
  workload: solution-smoke
  smoke_command: |
    python3 - <<'PY'
    import json
    import os
    from pathlib import Path

    from robomimic.scripts.config_gen import droid_runs_language_conditioned_rlds

    generator = droid_runs_language_conditioned_rlds.make_generator()
    artifact = {
        "solution": "droid-policy-learning",
        "capability": "rlds_config_generator",
        "generator_type": type(generator).__name__,
        "module": droid_runs_language_conditioned_rlds.__name__,
    }
    output_dir = Path(os.environ["NPA_SMOKE_OUTPUT_DIR"])
    (output_dir / "droid_rlds_config_generator.json").write_text(json.dumps(artifact, indent=2))
    print(json.dumps(artifact, indent=2))
    PY
  solution_name: "droid-policy-learning"
  capability_name: "rlds_config_generator"
  smoke_artifact_name: "droid_rlds_config_generator.json"
  resource_profile_yaml: "npa/workflows/workbench/skypilot/byof-container-smoke-rtxpro.yaml"
  task: "droid_rlds_config"
  iterations: 1
  num_envs: 1
  num_demos: 1
  wait_timeout: 21600
  poll_interval: 60

  output_root: s3://{{config.bucket}}/oss-solutions/droid-policy-learning/{{run.id}}
  summary_uri: "{{config.output_root}}/npa_byof_summary.json"
  dataset_uri: "{{config.output_root}}/dataset.hdf5"
  checkpoint_uri: "{{config.output_root}}/npa_isaac_lab_checkpoint.pt"
resources:
  gpu:
    cloud: kubernetes
    accelerators: RTXPRO6000:1
initial: byof-run
states:
  byof-run:
    description: >
      Build/push DROID policy-learning and run the RLDS config smoke from the
      registry image in live Kubernetes.
    toolRef: workbench.byof.repo
    resources: gpu
    outputs:
      - uri: "{{config.summary_uri}}"
        schema: npa.workbench.byof.summary.v1
    terminal: true
