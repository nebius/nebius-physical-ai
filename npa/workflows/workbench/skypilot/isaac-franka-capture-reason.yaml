# Isaac Lab Franka sim frames → Token Factory Cosmos3 reasoner (combo workflow).
#
# Stage 1 (Nebius k8s L40S): headless Isaac-Lift-Cube-Franka-v0 rollout captures
# RGB frames from a simulated Franka arm and uploads PNGs to S3.
# Stage 2 (CPU, zero-GPU): Token Factory nvidia/Cosmos3-Super-Reasoner reasons
# over those frames and writes scene_reasoning.json.
#
# Guide: docs/hackathon-isaac-token-factory.md
#
#   sky jobs launch \
#     --secret NEBIUS_TOKEN_FACTORY_KEY \
#     --secret AWS_ACCESS_KEY_ID \
#     --secret AWS_SECRET_ACCESS_KEY \
#     npa/workflows/workbench/skypilot/isaac-franka-capture-reason.yaml
name: isaac-franka-capture-reason
execution: serial
---
name: isaac-franka-capture
resources:
  cloud: kubernetes
  accelerators: L40S:1
  cpus: 16
  memory: 64
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-isaac-lab:2.3.2.post1"
envs:
  NPA_ISAAC_LAB_RUN_ID: "<your-run-id>"
  ISAAC_LAB_TASK: "Isaac-Lift-Cube-Franka-v0"
  ISAAC_CAPTURE_MAX_STEPS: "80"
  ISAAC_CAPTURE_MAX_FRAMES: "6"
  SCENE_URI: "s3://<your-bucket-name>/hackathon/<run-id>/isaac-franka/scene/"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  PYTHON_BIN="${ISAAC_LAB_PYTHON:-/isaac-sim/python.sh}"
  if [ ! -x "${PYTHON_BIN}" ]; then
    PYTHON_BIN="$(command -v python3 || command -v python)"
  fi
  "${PYTHON_BIN}" -m pip install --quiet boto3
run: |
  set -euo pipefail
  if [[ "${SCENE_URI}" != s3://* ]]; then
    echo "SCENE_URI must be an s3:// URI" >&2
    exit 1
  fi
  PYTHON_BIN="${ISAAC_LAB_PYTHON:-/isaac-sim/python.sh}"
  if [ ! -x "${PYTHON_BIN}" ]; then
    PYTHON_BIN="$(command -v python3 || command -v python)"
  fi
  REPO_ROOT="${NPA_REPO_ROOT:-/opt/nebius-physical-ai}"
  if [ -d "${REPO_ROOT}/npa" ]; then
  cd "${REPO_ROOT}"
  "${PYTHON_BIN}" npa/scripts/capture_isaac_lab_scene_frames.py \
    --task "${ISAAC_LAB_TASK}" \
    --output-path "${SCENE_URI}" \
    --max-steps "${ISAAC_CAPTURE_MAX_STEPS}" \
    --max-frames "${ISAAC_CAPTURE_MAX_FRAMES}"
  else
    echo "NPA repo not found at ${REPO_ROOT}; mount or bake /opt/nebius-physical-ai" >&2
    exit 1
  fi
---
name: token-factory-reason
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  image_id: "docker:${NPA_TOKEN_FACTORY_IMAGE}"
envs:
  NPA_TOKEN_FACTORY_IMAGE: "cr.eu-north1.nebius.cloud/<your-registry-id>/npa-cosmos:1.0.9"
  SCENE_URI: "s3://<your-bucket-name>/hackathon/<run-id>/isaac-franka/scene/"
  PLAN_URI: "s3://<your-bucket-name>/hackathon/<run-id>/isaac-franka/reasoning/"
  REASON_MODEL: "nvidia/Cosmos3-Super-Reasoner"
  REASON_TASK: "These images are RGB frames from an Isaac Lab simulation of a Franka arm lifting a cube. Describe the scene, identify the robot and objects, and give a step-by-step manipulation plan."
  MAX_IMAGES: "8"
  MAX_TOKENS: "1024"
  TEMPERATURE: "0.2"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -e
  if ! command -v npa >/dev/null 2>&1 && [ -d /opt/nebius-physical-ai/npa ]; then
    python3 -m pip install -e /opt/nebius-physical-ai/npa
  fi
run: |
  set -euo pipefail
  if [[ -z "${NEBIUS_TOKEN_FACTORY_KEY:-}" ]]; then
    echo "NEBIUS_TOKEN_FACTORY_KEY is required. Pass it with: sky jobs launch --secret NEBIUS_TOKEN_FACTORY_KEY ..." >&2
    exit 1
  fi
  if [[ "${SCENE_URI}" != s3://* || "${PLAN_URI}" != s3://* ]]; then
    echo "SCENE_URI and PLAN_URI must be s3:// URIs" >&2
    exit 1
  fi
  npa workbench token-factory reason \
    --input-path "${SCENE_URI}" \
    --output-path "${PLAN_URI}" \
    --task "${REASON_TASK}" \
    --model "${REASON_MODEL}" \
    --max-images "${MAX_IMAGES}" \
    --max-tokens "${MAX_TOKENS}" \
    --temperature "${TEMPERATURE}" \
    --output json
