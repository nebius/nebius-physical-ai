# -----------------------------------------------------------------------------
# File: manifests/02-csi-rwx-cross-node.yaml
# Purpose:
#   Create a shared RWX PVC and two pods that use the same claim from different
#   nodes so we can validate cross-node data sharing.
#
# Why We Run This:
#   The Nebius Shared Filesystem is most valuable when multiple pods on
#   different nodes can observe the same files. This manifest is the practical
#   proof for that behavior while also verifying that a PVC with no explicit
#   StorageClass inherits the cluster default.
#
# Reference Docs:
#   https://docs.nebius.com/kubernetes/storage/filesystem-over-csi
#
# Applied By:
#   ./03-run-csi-rwx-cross-node-test.sh
#
# Created By: Aaron Fagan
# Created On: 2026-03-17
# Version: 0.1.0
# -----------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filesystem-csi-rwx-pvc
  labels:
    app.kubernetes.io/part-of: filesystem-csi-validation
    app.kubernetes.io/component: rwx-test
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: filesystem-csi-rwx-writer
  labels:
    app: filesystem-csi-rwx-check
    app.kubernetes.io/part-of: filesystem-csi-validation
    app.kubernetes.io/component: rwx-writer
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - filesystem-csi-rwx-check
          topologyKey: kubernetes.io/hostname
  containers:
    - name: writer
      image: busybox
      command: ["sleep", "1000000"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
      volumeMounts:
        - mountPath: /data
          name: my-csi-volume
  volumes:
    - name: my-csi-volume
      persistentVolumeClaim:
        claimName: filesystem-csi-rwx-pvc
---
apiVersion: v1
kind: Pod
metadata:
  name: filesystem-csi-rwx-reader
  labels:
    app: filesystem-csi-rwx-check
    app.kubernetes.io/part-of: filesystem-csi-validation
    app.kubernetes.io/component: rwx-reader
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - filesystem-csi-rwx-check
          topologyKey: kubernetes.io/hostname
  containers:
    - name: reader
      image: busybox
      command: ["sleep", "1000000"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
      volumeMounts:
        - mountPath: /data
          name: my-csi-volume
  volumes:
    - name: my-csi-volume
      persistentVolumeClaim:
        claimName: filesystem-csi-rwx-pvc
