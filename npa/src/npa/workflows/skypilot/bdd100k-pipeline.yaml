# BDD100K reproduction pipeline.
#
# Guide:   docs/workbench/cookbooks/bdd100k-pipeline.md (prerequisites, run, verify)
# Demo:    docs/demos/bdd100k-lancedb-demo.md
# Runner:  npa/scripts/run_bdd100k_pipeline.py (renders run-scoped S3 paths)
# Index:   npa/src/npa/workflows/skypilot/README.md
#
# SkyPilot 0.12.2 supports serial pipelines and all-parallel job groups, but
# not mixed dependency graphs in one YAML. Training and evaluation therefore
# run serially here; split them into separate parallel job groups only when the
# orchestration layer supports cross-job dependencies.
name: bdd100k-pipeline
execution: serial
---
# Stage 1: import the BDD100K subset into a per-run LanceDB table.
name: bdd100k-ingest
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  # Pinned first-party LanceDB image; override image_id only for BYO registries.
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-lancedb:0.30.3"
envs:
  NPA_PIPELINE_RUN_ID: "<your-run-id>"
  S3_BUCKET: "${NPA_S3_BUCKET}"  # set NPA_S3_BUCKET=your-bucket-name
  S3_PREFIX: "bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  PIPELINE_ROOT_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  BDD100K_SOURCE_URI: "s3://${NPA_S3_BUCKET}/raw-bdd100k/subset-demo/"
  BDD100K_LIMIT: "10000"
  BDD100K_SYNTHETIC_ROWS: "0"
  LANCE_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}/lancedb/"
  LANCE_TABLE: bdd100k
  LANCEDB_ENDPOINT: http://npa-lancedb.workbench.svc.cluster.local:8686
  LANCEDB_TOKEN: ""
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${LANCEDB_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${LANCEDB_TOKEN}")
  fi

  post_lancedb() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${LANCEDB_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "LanceDB ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${LANCEDB_ENDPOINT}/health" | jq -e '.status == "ok"'
  if [[ "${BDD100K_SYNTHETIC_ROWS}" != "0" ]]; then
    payload=$(jq -n \
      --arg table "${LANCE_TABLE}" \
      --arg lance_uri "${LANCE_URI}" \
      --argjson synthetic "${BDD100K_SYNTHETIC_ROWS}" \
      '{table: $table, lance_uri: $lance_uri, synthetic: $synthetic, splits: ["train", "val"]}')
  else
    payload=$(jq -n \
      --arg source "${BDD100K_SOURCE_URI}" \
      --arg table "${LANCE_TABLE}" \
      --arg lance_uri "${LANCE_URI}" \
      --argjson limit "${BDD100K_LIMIT}" \
      '{source: $source, table: $table, lance_uri: $lance_uri, limit: $limit, splits: ["train", "val"]}')
  fi
  post_lancedb "/import-bdd100k" "${payload}" import-response.json
  jq -e '.total_rows > 0 and .table == env.LANCE_TABLE' import-response.json
---
# Stage 2: backfill CPU UDF columns required by the views and duplicate checks.
name: bdd100k-backfill-cpu
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  # Pinned first-party LanceDB image; override image_id only for BYO registries.
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-lancedb:0.30.3"
envs:
  NPA_PIPELINE_RUN_ID: "<your-run-id>"
  S3_BUCKET: "${NPA_S3_BUCKET}"  # set NPA_S3_BUCKET=your-bucket-name
  S3_PREFIX: "bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  PIPELINE_ROOT_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  LANCE_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}/lancedb/"
  LANCE_TABLE: bdd100k
  CPU_BACKFILL_BATCH_SIZE: "512"
  LANCEDB_ENDPOINT: http://npa-lancedb.workbench.svc.cluster.local:8686
  LANCEDB_TOKEN: ""
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${LANCEDB_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${LANCEDB_TOKEN}")
  fi

  post_lancedb() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${LANCEDB_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "LanceDB ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${LANCEDB_ENDPOINT}/health" | jq -e '.status == "ok"'
  for udf in has_person has_rider person_bbox_area_pct dhash is_duplicate; do
    payload=$(jq -n \
      --arg table "${LANCE_TABLE}" \
      --arg lance_uri "${LANCE_URI}" \
      --arg udf "${udf}" \
      --argjson batch_size "${CPU_BACKFILL_BATCH_SIZE}" \
      '{table: $table, lance_uri: $lance_uri, udf: $udf, batch_size: $batch_size}')
    post_lancedb "/backfill" "${payload}" "backfill-${udf}.json"
    jq -e '.table == env.LANCE_TABLE and .udf == "'"${udf}"'" and .gpu_used == false' "backfill-${udf}.json"
  done
---
