          - npa/workflows/workbench/skypilot/isaac-lab-rl-sweep.yaml
          - npa/workflows/workbench/skypilot/mjlab-eval.yaml
          - npa/workflows/workbench/skypilot/retargeting.yaml
          - npa/workflows/workbench/skypilot/sim-to-real-loop.yaml
          - npa/workflows/workbench/skypilot/sim-to-real-pipeline.yaml
          - npa/workflows/workbench/skypilot/sim-to-real-trigger.yaml
          - npa/workflows/workbench/skypilot/sonic-eval.yaml
          - npa/workflows/workbench/skypilot/sonic-export-eval.yaml
          - npa/workflows/workbench/skypilot/sonic-export.yaml
          - npa/workflows/workbench/skypilot/sonic-locomotion-finetuning.yaml
          - npa/workflows/workbench/skypilot/sonic-train-standalone.yaml
          - npa/workflows/workbench/skypilot/vlm-eval.yaml
          - npa/workflows/workbench/skypilot/vlm-eval-benchmark.yaml
