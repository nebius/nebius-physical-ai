name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the supported floor (3.10), a common current version, and the
        # latest release so requires-python = ">=3.10" is actually tested.
        python-version: ["3.10", "3.12", "3.14"]
    env:
      NPA_PROJECT_ID: project-test-00000000
      NPA_S3_BUCKET: test-bucket-00000000
      NPA_E2E_PROJECT_ID: project-test-00000000
      NPA_E2E_GROOT_BUCKET: test-bucket-00000000

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install npa
        run: cd npa && pip install -e ".[dev,adapter]"

      - name: Verify checked-out CLI flags
        run: |
          cd npa
          git rev-parse HEAD
          python - <<'PY'
          from pathlib import Path

          from click.utils import strip_ansi
          import npa
          from npa.cli.main import app
          from typer.testing import CliRunner

          module_path = Path(npa.__file__).resolve()
          print(f"npa module: {module_path}")

          runner = CliRunner()
          checks = [
              (["workbench", "fiftyone", "load-dataset", "--help"], "--format"),
              (["workbench", "lerobot", "deploy", "--help"], "--disk-size"),
              (["workbench", "genesis", "deploy", "--help"], "--disk-size"),
              (["workbench", "isaac-lab", "deploy", "--help"], "--disk-size"),
              (["workbench", "cosmos", "deploy", "--help"], "--disk-size"),
              (["workbench", "fiftyone", "deploy", "--help"], "--disk-size"),
          ]
          for args, flag in checks:
              result = runner.invoke(app, args)
              output = strip_ansi(result.output)
              if result.exit_code != 0:
                  raise SystemExit(
                      f"{' '.join(args)} failed with exit code {result.exit_code}\n{output}"
                  )
              if flag not in output:
                  raise SystemExit(
                      f"{flag} missing from {' '.join(args)} help output\n{output}"
                  )
          PY

      - name: Run pytest with coverage
        # The floor sits below the current ~66% so version-dependent skips
        # don't flake the gate; raise it as coverage grows, never lower it.
        run: cd npa && python -m pytest tests/ -v --tb=short --cov=npa --cov-report=term-missing --cov-fail-under=60

      - name: Run CLI install test
        run: cd npa && bash tests/integration/test_cli_install.sh

      - name: Check e2e shell scripts
        run: |
          cd npa
          bash -n tests/e2e/test_lerobot_e2e.sh
          bash -n tests/e2e/test_genesis_e2e.sh
          bash -n tests/e2e/test_groot_e2e.sh
          bash -n tests/e2e/test_groot_composition_e2e.sh

      - name: Warn on source drift
        if: always()
        run: ./scripts/check-source-drift.sh
