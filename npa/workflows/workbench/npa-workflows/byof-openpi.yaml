apiVersion: npa.workflow/v0.0.1
kind: Workflow
metadata:
  name: byof-openpi
  description: >
    Registry-candidate BYOF workflow for Physical Intelligence OpenPI. Materializes
    pi05_droid config, downloads the public checkpoint, and runs one dummy
    policy.infer inside the pushed registry image.
config:
  bucket: example-bucket
  repo_url: "https://github.com/Physical-Intelligence/openpi.git"
  repo_ref: "15a9616a00943ada6c20a0f158e3adb39df2ccac"
  base_profile: ubuntu
  base_image: "nvidia/cuda:12.8.1-cudnn-devel-ubuntu24.04"
  build_command: >
    apt-get update &&
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
    python3 python3-dev python3-pip python3-venv git git-lfs curl ca-certificates &&
    python3 -m venv /opt/venv &&
    /opt/venv/bin/python -m pip install --no-cache-dir --upgrade pip &&
    /opt/venv/bin/python -m pip install --no-cache-dir uv &&
    GIT_LFS_SKIP_SMUDGE=1 /opt/venv/bin/uv pip install --python /opt/venv/bin/python --no-cache -e . &&
    curl -sSL https://sdk.cloud.google.com/install.sh | bash -s -- --disable-prompts --install-dir=/opt &&
    ln -sf /opt/google-cloud-sdk/bin/gsutil /usr/local/bin/gsutil || true
  workload: solution-smoke
  smoke_command: |
    export PATH="/opt/google-cloud-sdk/bin:/usr/local/bin:${PATH}"
    /opt/venv/bin/python - <<'PY'
    import json
    import os
    import shutil
    import subprocess
    from pathlib import Path

    import numpy as np
    from openpi.training import config as openpi_config
    from openpi.policies import policy_config
    from openpi.shared import download

    output_dir = Path(os.environ["NPA_SMOKE_OUTPUT_DIR"])
    results = {
        "solution": "openpi",
        "capability": "pi05_droid_checkpoint_infer",
        "capabilities_exercised": [],
        "gsutil_path": shutil.which("gsutil") or "",
    }

    cfg = openpi_config.get_config("pi05_droid")
    assert cfg is not None
    results["config"] = {
        "config_name": cfg.name,
        "model_type": type(cfg.model).__name__ if getattr(cfg, "model", None) is not None else "",
        "data_type": type(cfg.data).__name__ if getattr(cfg, "data", None) is not None else "",
    }
    results["capabilities_exercised"].append("policy_config_materialization")
    (output_dir / "openpi_pi05_droid_config.json").write_text(
        json.dumps({"solution": "openpi", "capability": "policy_config_materialization", **results["config"]}, indent=2)
    )

    checkpoint = {"uri": "gs://openpi-assets/checkpoints/pi05_droid", "ok": False, "error": "", "path": ""}
    infer = {"ok": False, "error": "", "action_shape": []}
    checkpoint_dir = None
    try:
        # Prefer upstream helper (routes openpi-assets through gsutil when present).
        checkpoint_dir = download.maybe_download("gs://openpi-assets/checkpoints/pi05_droid")
        checkpoint["path"] = str(checkpoint_dir)
        checkpoint["ok"] = Path(checkpoint_dir).exists()
        checkpoint["mode"] = "maybe_download"
    except Exception as exc:  # noqa: BLE001
        checkpoint["maybe_download_error"] = f"{type(exc).__name__}: {exc}"
        # Anonymous HTTPS fallback via google storage JSON API + curl for a tiny proof,
        # then full gsutil/fsspec retry with anonymous token.
        try:
            dest = Path(os.environ.get("OPENPI_DATA_HOME", str(Path.home() / ".cache" / "openpi"))) / "openpi-assets" / "checkpoints" / "pi05_droid"
            dest.mkdir(parents=True, exist_ok=True)
            if shutil.which("gsutil"):
                completed = subprocess.run(
                    ["gsutil", "-m", "cp", "-r", "gs://openpi-assets/checkpoints/pi05_droid/*", str(dest)],
                    capture_output=True,
                    text=True,
                    check=False,
                    timeout=7200,
                )
                checkpoint["gsutil_returncode"] = completed.returncode
                checkpoint["gsutil_stderr_tail"] = (completed.stderr or "")[-1500:]
                if completed.returncode == 0 and any(dest.rglob("*")):
                    checkpoint_dir = dest
                    checkpoint["path"] = str(dest)
                    checkpoint["ok"] = True
                    checkpoint["mode"] = "gsutil_direct"
            if not checkpoint["ok"]:
                import fsspec

                fs = fsspec.filesystem("gs", token="anon")
                fs.get("openpi-assets/checkpoints/pi05_droid", str(dest), recursive=True)
                checkpoint_dir = dest
                checkpoint["path"] = str(dest)
                checkpoint["ok"] = True
                checkpoint["mode"] = "fsspec_anon"
        except Exception as exc2:  # noqa: BLE001
            checkpoint["error"] = (
                f"maybe_download={checkpoint.get('maybe_download_error')}; fallback={type(exc2).__name__}: {exc2}"
            )

    if checkpoint["ok"] and checkpoint_dir is not None:
        results["capabilities_exercised"].append("pi05_droid_checkpoint_download")
        try:
            policy = policy_config.create_trained_policy(cfg, checkpoint_dir)
            # Prefer upstream droid example helper when available.
            try:
                from openpi.policies import droid_policy

                example = droid_policy.make_droid_example()
                example["prompt"] = "pick up the fork"
            except Exception:  # noqa: BLE001
                example = {
                    "observation/exterior_image_1_left": np.zeros((224, 224, 3), dtype=np.uint8),
                    "observation/wrist_image_left": np.zeros((224, 224, 3), dtype=np.uint8),
                    "observation/joint_position": np.zeros((7,), dtype=np.float64),
                    "observation/gripper_position": np.zeros((1,), dtype=np.float64),
                    "prompt": "pick up the fork",
                }
            out = policy.infer(example)
            actions = out["actions"]
            infer["ok"] = True
            infer["action_type"] = type(actions).__name__
            infer["action_shape"] = list(getattr(actions, "shape", []))
            results["capabilities_exercised"].append("pi05_droid_checkpoint_infer")
        except Exception as exc:  # noqa: BLE001
            infer["error"] = f"{type(exc).__name__}: {exc}"
    elif not checkpoint.get("error"):
        checkpoint["error"] = checkpoint.get("maybe_download_error") or "checkpoint_download_failed"

    results["checkpoint"] = checkpoint
    results["infer"] = infer
    (output_dir / "openpi_pi05_droid_checkpoint_infer.json").write_text(
        json.dumps(
            {
                "solution": "openpi",
                "capability": "pi05_droid_checkpoint_infer",
                "checkpoint": checkpoint,
                "infer": infer,
            },
            indent=2,
        )
    )

    if "pi05_droid_checkpoint_download" not in results["capabilities_exercised"]:
        results.setdefault("deferred", []).append(
            {"capability": "pi05_droid_checkpoint_download", "blocker": checkpoint.get("error")}
        )
    if "pi05_droid_checkpoint_infer" not in results["capabilities_exercised"]:
        results.setdefault("deferred", []).append(
            {"capability": "pi05_droid_checkpoint_infer", "blocker": infer.get("error") or checkpoint.get("error")}
        )

    (output_dir / "openpi_pi05_droid_config.json").write_text(json.dumps(results, indent=2))
    print(json.dumps(results, indent=2))
    # Hard gate: documented pi05_droid config materialization. Checkpoint download
    # + infer remain attempted evidence (GCS/network and model runtime deps).
    if "policy_config_materialization" not in results["capabilities_exercised"]:
        raise SystemExit("openpi policy_config_materialization failed")
    PY
  solution_name: "openpi"
  capability_name: "policy_config_materialization"
  smoke_artifact_name: "openpi_pi05_droid_config.json"
  resource_profile_yaml: "npa/workflows/workbench/skypilot/byof-solution-smoke-rtxpro-gpu.yaml"
  task: "pi05_droid"
  iterations: 1
  num_envs: 1
  num_demos: 1
  wait_timeout: 21600
  poll_interval: 60

  output_root: s3://{{config.bucket}}/oss-solutions/openpi/{{run.id}}
  summary_uri: "{{config.output_root}}/npa_byof_summary.json"
  dataset_uri: "{{config.output_root}}/dataset.hdf5"
  checkpoint_uri: "{{config.output_root}}/npa_isaac_lab_checkpoint.pt"
resources:
  gpu:
    cloud: kubernetes
    accelerators: RTXPRO6000:1
initial: byof-run
states:
  byof-run:
    description: >
      Build/push OpenPI and run pi05_droid config + checkpoint infer capability
      smokes from the registry image in live Kubernetes.
    toolRef: workbench.byof.repo
    resources: gpu
    outputs:
      - uri: "{{config.summary_uri}}"
        schema: npa.workbench.byof.summary.v1
    terminal: true
