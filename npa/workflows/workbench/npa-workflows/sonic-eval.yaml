apiVersion: npa.workflow/v0.0.1
kind: Workflow

metadata:
  name: sonic-eval
  description: Evaluate an exported SONIC ONNX locomotion policy.
  skypilotTwin: npa/src/npa/workflows/skypilot/sonic-eval.yaml

config:
  bucket: example-bucket
  prefix: "runs/{{run.id}}/sonic-eval"
  episodes: "8"
  env: smoke

  onnx_uri: "s3://{{config.bucket}}/{{config.prefix}}/sonic_policy.onnx"

resources:
  gpu:
    cloud: kubernetes
    accelerators: H100:1
    cpus: 8
    memory: 32Gi

initial: eval-onnx

states:
  eval-onnx:
    description: Evaluate an exported SONIC ONNX locomotion policy.
    toolRef: workbench.sonic.eval
    resources: gpu
    outputs:
      - uri: "s3://{{config.bucket}}/{{config.prefix}}/eval.json"
        schema: npa.workbench.sonic.eval.v1
    terminal: true
