# Export a trained SONIC locomotion policy checkpoint to ONNX.
name: sonic-export
execution: serial
---
name: sonic-export-onnx
resources:
  cloud: kubernetes
  accelerators: L40S:1
  cpus: 8
  memory: 32
  # NPA_SONIC_IMAGE is BYO-overridable. The default matches SONIC_IMAGE_VARIANT.
  image_id: "docker:${NPA_SONIC_IMAGE}"
envs:
  NPA_SONIC_IMAGE: "cr.eu-north1.nebius.cloud/e00cm0vc6t09m0z5gw/npa-sonic:0.1.2"
  NPA_PIPELINE_RUN_ID: "<run-id>"
  SONIC_GPU_TARGET: "L40S"
  SONIC_IMAGE_VARIANT: "sonic-l40s-baked"
  SONIC_CHECKPOINT: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/training/last.pt"
  SONIC_OUTPUT: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/export/"
  SONIC_OPSET: "17"
  SONIC_AXES: "dynamic"
  SONIC_NORMALIZE: "baked"
  SONIC_METADATA: "sidecar"
  SONIC_OBS_SPEC: ""
  SONIC_ACTION_SPEC: ""
  SONIC_CONFIG: ""
  SONIC_VERIFY: "1"
  SONIC_PARITY_ATOL: "1e-4"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  PYTHON_BIN="${NPA_PYTHON_BIN:-$(command -v python3 || command -v python)}"
  if ! command -v npa >/dev/null 2>&1; then
    if [ -n "${NPA_REPO_DIR:-}" ] && [ -d "${NPA_REPO_DIR}/npa" ]; then
      "${PYTHON_BIN}" -m pip install -e "${NPA_REPO_DIR}/npa"
    elif [ -d "./npa" ]; then
      "${PYTHON_BIN}" -m pip install -e ./npa
    fi
  fi
  "${PYTHON_BIN}" -m pip install --quiet boto3
run: |
  set -euo pipefail
  echo "SONIC image variant ${SONIC_IMAGE_VARIANT} selected for ${SONIC_GPU_TARGET}" >&2
  WORK_DIR="/tmp/npa-sonic-export-${NPA_PIPELINE_RUN_ID}"
  mkdir -p "${WORK_DIR}"
  export NPA_SONIC_EXPORT_WORK_DIR="${WORK_DIR}"
  export NPA_SONIC_EXPORT_OUTPUT_LOCAL="${WORK_DIR}/sonic_policy.onnx"

  python3 <<'PY'
  import os
  from pathlib import Path
  from urllib.parse import urlparse

  import boto3

  work_dir = Path(os.environ["NPA_SONIC_EXPORT_WORK_DIR"])
  s3 = boto3.client("s3", endpoint_url=os.environ.get("AWS_ENDPOINT_URL") or None)

  def fetch(value: str, name: str) -> str:
      if not value:
          return ""
      parsed = urlparse(value)
      if parsed.scheme != "s3":
          return value
      target = work_dir / name
      s3.download_file(parsed.netloc, parsed.path.lstrip("/"), str(target))
      return str(target)

  os.environ["NPA_SONIC_CHECKPOINT_LOCAL"] = fetch(os.environ["SONIC_CHECKPOINT"], "checkpoint.pt")
  os.environ["NPA_SONIC_OBS_SPEC_LOCAL"] = fetch(os.environ.get("SONIC_OBS_SPEC", ""), "obs_spec.yaml")
  os.environ["NPA_SONIC_ACTION_SPEC_LOCAL"] = fetch(os.environ.get("SONIC_ACTION_SPEC", ""), "action_spec.yaml")
  os.environ["NPA_SONIC_CONFIG_LOCAL"] = fetch(os.environ.get("SONIC_CONFIG", ""), "config.yaml")
  PY

  cmd=(
    npa workbench sonic export
    --checkpoint "${NPA_SONIC_CHECKPOINT_LOCAL}"
    --output "${NPA_SONIC_EXPORT_OUTPUT_LOCAL}"
    --opset "${SONIC_OPSET}"
    --axes "${SONIC_AXES}"
    --normalize "${SONIC_NORMALIZE}"
    --metadata "${SONIC_METADATA}"
    --parity-atol "${SONIC_PARITY_ATOL}"
    --output-format json
  )
  if [ -n "${NPA_SONIC_OBS_SPEC_LOCAL}" ]; then
    cmd+=(--obs-spec "${NPA_SONIC_OBS_SPEC_LOCAL}")
  fi
  if [ -n "${NPA_SONIC_ACTION_SPEC_LOCAL}" ]; then
    cmd+=(--action-spec "${NPA_SONIC_ACTION_SPEC_LOCAL}")
  fi
  if [ -n "${NPA_SONIC_CONFIG_LOCAL}" ]; then
    cmd+=(--config "${NPA_SONIC_CONFIG_LOCAL}")
  fi
  if [ "${SONIC_VERIFY}" = "1" ]; then
    cmd+=(--verify)
  else
    cmd+=(--no-verify)
  fi

  printf 'SONIC_EXPORT_COMMAND'
  printf ' %q' "${cmd[@]}"
  printf '\n'
  "${cmd[@]}" | tee "${WORK_DIR}/sonic_export_result.json"

  python3 <<'PY'
  import os
  from pathlib import Path
  from urllib.parse import urlparse

  import boto3

  output = os.environ["SONIC_OUTPUT"].rstrip("/") + "/"
  parsed = urlparse(output)
  if parsed.scheme != "s3":
      raise SystemExit(f"SONIC_OUTPUT must be an s3:// prefix for this workflow: {output}")

  work_dir = Path(os.environ["NPA_SONIC_EXPORT_WORK_DIR"])
  s3 = boto3.client("s3", endpoint_url=os.environ.get("AWS_ENDPOINT_URL") or None)
  for path in work_dir.iterdir():
      if path.is_file():
          s3.upload_file(str(path), parsed.netloc, parsed.path.lstrip("/") + path.name)
  PY
