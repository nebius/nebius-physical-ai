<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mock Lichtblick</title>
    <style>
      html, body { margin: 0; background: #0b1220; color: #e2e8f0; font: 14px sans-serif; }
      #panel { padding: 16px; }
      canvas { display: block; width: 100%; height: 70vh; background: #000; }
    </style>
  </head>
  <body>
    <div id="panel">
      <h1 data-testid="mock-lichtblick-title">Lichtblick (mock)</h1>
      <p id="dsInfo">data source: <code id="dsUrl"></code></p>
      <p id="topics">/cosmos/augmented · /rollouts/iter_01/rollout-0000/camera · /signal/reward</p>
    </div>
    <canvas data-testid="mock-lichtblick-canvas" id="mockCanvas"></canvas>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const dsUrl = String(params.get("ds.url") || "");
        const el = document.getElementById("dsUrl");
        if (el) el.textContent = dsUrl;
        const canvas = document.getElementById("mockCanvas");
        const w = 640;
        const h = 400;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0a1020";
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#33cc99";
        ctx.fillRect(40, 40, 220, 160);
        window.__NPA_MOCK_LICHTBLICK__ = { dsUrl };
      })();
    </script>
  </body>
</html>
