# Cosmos3 source navigation inventory.
#
# NPA-authored by reference to NVIDIA cosmos-framework
# .agents/skills/cosmos3-codebase-nav/SKILL.md.
name: cosmos3-codebase-nav
resources:
  cloud: kubernetes
  cpus: 4+
  memory: 16+
  disk_size: 128
envs:
  NPA_COSMOS3_SOURCE_REPO: "https://github.com/NVIDIA/cosmos-framework.git"
  NPA_COSMOS3_CACHE: "/tmp/npa-cosmos3-nav"
  NPA_COSMOS3_GITHUB_TOKEN_ENV: "GITHUB_TOKEN"
  NPA_COSMOS3_NAV_OUTPUT: "/tmp/npa-cosmos3-nav/codebase-nav.json"
  NPA_COSMOS3_OUTPUT_S3_URI: ""
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  if ! command -v git >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends git ca-certificates
    else
      echo "git is required for Cosmos3 source checkout" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail
  rm -rf "${NPA_COSMOS3_CACHE}"
  mkdir -p "${NPA_COSMOS3_CACHE}"
  github_token_value="${!NPA_COSMOS3_GITHUB_TOKEN_ENV-}"
  if [ -n "${github_token_value}" ]; then
    repo_host="$(python3 - <<'PY'
  import os
  from urllib.parse import urlparse

  print(urlparse(os.environ["NPA_COSMOS3_SOURCE_REPO"]).hostname or "github.com")
  PY
  )"
    export GIT_CONFIG_COUNT=1
    export GIT_CONFIG_KEY_0="http.https://${repo_host}/.extraheader"
    export GIT_CONFIG_VALUE_0="AUTHORIZATION: bearer ${github_token_value}"
  fi
  git clone --depth 1 "${NPA_COSMOS3_SOURCE_REPO}" "${NPA_COSMOS3_CACHE}/source"
  unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0

  python3 - <<'PY'
  import json
  import os
  from pathlib import Path

  root = Path(os.environ["NPA_COSMOS3_CACHE"]) / "source"
  paths = {
      "sampling_args": "cosmos_framework/inference/args.py",
      "inference_defaults": "cosmos_framework/inference/defaults",
      "inference_script": "cosmos_framework/scripts/inference.py",
      "train_script": "cosmos_framework/scripts/train.py",
      "export_script": "cosmos_framework/scripts/export_model.py",
      "sft_recipes": "examples/toml/sft_config",
      "sft_launchers": "examples",
      "ray_configs": "cosmos_framework/inference/ray/configs",
      "prompt_upsampler": "cosmos_framework/inference/defaults/prompt_upsampler.txt",
      "video_captioner": "cosmos_framework/inference/defaults/video_captioner.txt",
  }
  inventory = {
      "status": "ok",
      "source_repo": os.environ["NPA_COSMOS3_SOURCE_REPO"],
      "paths": {
          key: {
              "path": value,
              "exists": (root / value).exists(),
          }
          for key, value in paths.items()
      },
      "default_modes": sorted(
          p.name for p in (root / "cosmos_framework/inference/defaults").iterdir()
          if p.is_dir()
      ) if (root / "cosmos_framework/inference/defaults").is_dir() else [],
      "sft_recipe_files": sorted(
          p.name for p in (root / "examples/toml/sft_config").glob("*.toml")
      ) if (root / "examples/toml/sft_config").is_dir() else [],
  }
  output = Path(os.environ["NPA_COSMOS3_NAV_OUTPUT"])
  output.parent.mkdir(parents=True, exist_ok=True)
  output.write_text(json.dumps(inventory, indent=2, sort_keys=True) + "\n", encoding="utf-8")
  print(json.dumps(inventory, sort_keys=True))
  PY

  if [ -n "${NPA_COSMOS3_OUTPUT_S3_URI}" ]; then
    if ! command -v aws >/dev/null 2>&1; then
      python3 -m pip install --user "awscli>=1.32"
    fi
    aws s3 cp "${NPA_COSMOS3_NAV_OUTPUT}" "${NPA_COSMOS3_OUTPUT_S3_URI%/}/codebase-nav.json"
  fi
