# Stage 5c: train on the distant-person failure-mode view.
name: bdd100k-train-distant
resources:
  cloud: kubernetes
  accelerators: H100:1
  cpus: 16
  memory: 64
  # Pinned first-party detection-training image; override image_id only for BYO registries.
