---
# Stage 4: create the three failure-mode materialized views used for training.
name: bdd100k-create-mvs
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  # Pinned first-party LanceDB image; override image_id only for BYO registries.
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-lancedb:0.30.3"
envs:
  NPA_PIPELINE_RUN_ID: "<your-run-id>"
  S3_BUCKET: "${NPA_S3_BUCKET}"  # set NPA_S3_BUCKET=your-bucket-name
  S3_PREFIX: "bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  PIPELINE_ROOT_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  LANCE_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}/lancedb/"
  LANCE_TABLE: bdd100k
  LANCEDB_ENDPOINT: http://npa-lancedb.workbench.svc.cluster.local:8686
  LANCEDB_TOKEN: ""
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${LANCEDB_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${LANCEDB_TOKEN}")
  fi

  post_lancedb() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${LANCEDB_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "LanceDB ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${LANCEDB_ENDPOINT}/health" | jq -e '.status == "ok"'

  create_mv() {
    local view_name="$1"
    local filter_sql="$2"
    local output="$3"
    payload=$(jq -n \
      --arg name "${view_name}" \
      --arg source_table "${LANCE_TABLE}" \
      --arg filter_sql "${filter_sql}" \
      --arg lance_uri "${LANCE_URI}" \
      '{name: $name, source_table: $source_table, filter_sql: $filter_sql, lance_uri: $lance_uri}')
    post_lancedb "/create-mv" "${payload}" "${output}"
    jq -e '.view_name == "'"${view_name}"'" and .row_count >= 0' "${output}"
  }

  create_mv bdd100k_rider_train "has_rider = true AND split = 'train'" mv-rider.json
  create_mv bdd100k_nighttime_person_train "timeofday = 'night' AND has_person = true AND split = 'train'" mv-nighttime.json
  create_mv bdd100k_distant_person_train "has_person = true AND person_bbox_area_pct < 0.01 AND split = 'train'" mv-distant.json
---
# Stage 5a: train on the rider failure-mode view.
name: bdd100k-train-rider
resources:
  cloud: kubernetes
  accelerators: H100:1
  cpus: 16
  memory: 64
  # Pinned first-party detection-training image; override image_id only for BYO registries.
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-detection-training:bdd100k-golden-eval-smoke-20260614T210000Z"
envs:
  NPA_PIPELINE_RUN_ID: "<your-run-id>"
  S3_BUCKET: "${NPA_S3_BUCKET}"  # set NPA_S3_BUCKET=your-bucket-name
  S3_PREFIX: "bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  PIPELINE_ROOT_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}"
  LANCE_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}/lancedb/"
  VIEW_NAME: bdd100k_rider_train
  VIEW_SLUG: bdd100k_rider_train
  TRAIN_OUTPUT_URI: "s3://${NPA_S3_BUCKET}/bdd100k-pipeline/${NPA_PIPELINE_RUN_ID}/training/bdd100k_rider_train"
  DETECTION_TRAINING_ENDPOINT: http://npa-detection-training.workbench.svc.cluster.local:8790
  DETECTION_TRAINING_TOKEN: ""
  # Synthetic BDD100K data - category names match the synthetic data generator.
  BDD100K_LABEL_MAP: '{"person":0,"rider":1,"car":2,"truck":3,"bus":4,"train":5,"motor":6,"bike":7,"traffic light":8,"traffic sign":9}'
  # Real BDD100K data - uncomment the line below and comment the line above.
  # BDD100K_LABEL_MAP: '{"pedestrian":0,"rider":1,"car":2,"truck":3,"bus":4,"train":5,"motorcycle":6,"bicycle":7,"traffic light":8,"traffic sign":9}'
  TRAIN_EPOCHS: "10"
  TRAIN_BATCH_SIZE: "8"
  TRAIN_LEARNING_RATE: "0.005"
  TRAIN_POLL_SECONDS: "30"
  TRAIN_TIMEOUT_SECONDS: "21600"
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${DETECTION_TRAINING_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${DETECTION_TRAINING_TOKEN}")
  fi

  post_detection() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${DETECTION_TRAINING_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  get_detection() {
    local path="$1"
    local output="$2"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}${path}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}/health" | jq -e '.status == "ok"'
  payload=$(jq -n \
    --arg view "${VIEW_NAME}" \
    --arg lance_uri "${LANCE_URI}" \
    --arg output_uri "${TRAIN_OUTPUT_URI}" \
    --arg data_path "${NPA_TRAINING_DATA_PATH:-${LANCE_URI}}" \
    --argjson overrides "${NPA_TRAINING_OVERRIDES_JSON:-[]}" \
    --arg wandb_enabled "${NPA_TRAINING_WANDB_ENABLED:-0}" \
    --arg wandb_project "${NPA_TRAINING_WANDB_PROJECT:-}" \
    --arg wandb_run_name "${NPA_TRAINING_WANDB_RUN_NAME:-}" \
    --arg wandb_mode "${WANDB_MODE:-disabled}" \
    --arg checkpoint_s3_uri "${NPA_CHECKPOINT_S3_URI:-${TRAIN_OUTPUT_URI}}" \
    --arg checkpoint_s3_endpoint_url "${NPA_CHECKPOINT_S3_ENDPOINT_URL:-${AWS_ENDPOINT_URL:-}}" \
    --argjson label_map "${BDD100K_LABEL_MAP}" \
    --argjson epochs "${TRAIN_EPOCHS}" \
    --argjson batch_size "${TRAIN_BATCH_SIZE}" \
    --argjson learning_rate "${TRAIN_LEARNING_RATE}" \
    '{view: $view, lance_uri: $lance_uri, output_uri: $output_uri, data_path: $data_path, overrides: $overrides, wandb: {enabled: ($wandb_enabled == "1"), project: $wandb_project, run_name: $wandb_run_name, mode: $wandb_mode}, checkpoint_s3: {uri: $checkpoint_s3_uri, endpoint_url: $checkpoint_s3_endpoint_url}, label_map: $label_map, epochs: $epochs, batch_size: $batch_size, learning_rate: $learning_rate}')
  post_detection "/train" "${payload}" train-response.json
  run_id=$(jq -r '.run_id' train-response.json)
  deadline=$((SECONDS + TRAIN_TIMEOUT_SECONDS))
  while true; do
    get_detection "/status?run_id=${run_id}" train-status.json
    status=$(jq -r '.status' train-status.json)
    if [[ "${status}" == "completed" ]]; then
      break
    fi
    if [[ "${status}" == "failed" ]]; then
      cat train-status.json >&2
      exit 1
    fi
    if (( SECONDS > deadline )); then
      echo "Training timed out for ${VIEW_NAME}" >&2
      cat train-status.json >&2
      exit 1
    fi
    sleep "${TRAIN_POLL_SECONDS}"
  done
  jq -e '.status == "completed" and .epochs_completed == .total_epochs and .checkpoint_uri_pattern != ""' train-status.json
---
