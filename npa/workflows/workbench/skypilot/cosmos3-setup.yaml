# Cosmos3 setup and access verification.
#
# NPA-authored by reference to NVIDIA cosmos-framework
# .agents/skills/cosmos3-setup/SKILL.md.
name: cosmos3-setup
resources:
  cloud: kubernetes
  accelerators: H100:1
  cpus: 16+
  memory: 128+
  disk_size: 1024
envs:
  NPA_COSMOS3_SOURCE_REPO: "https://github.com/NVIDIA/cosmos-framework.git"
  NPA_COSMOS3_MODEL_ID: "nvidia/Cosmos3-Nano"
  NPA_COSMOS3_CACHE: "/tmp/npa-cosmos3-cache"
  NPA_COSMOS3_GITHUB_TOKEN_ENV: "GITHUB_TOKEN"
  NPA_COSMOS3_HF_TOKEN_ENV: "HF_TOKEN"
  NPA_COSMOS3_NGC_API_KEY_ENV: "NGC_API_KEY"
  NPA_COSMOS3_REQUIRE_NGC: "0"
  NPA_COSMOS3_UV_GROUP: "cu130-train"
  NPA_COSMOS3_SETUP_JSON: "/tmp/npa-cosmos3-cache/setup.json"
  NPA_COSMOS3_OUTPUT_S3_URI: ""
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  if ! command -v git >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends curl ffmpeg git git-lfs libx11-dev tree wget ca-certificates
    else
      echo "git is required for Cosmos3 source checkout" >&2
      exit 1
    fi
  fi
  if ! command -v uv >/dev/null 2>&1; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="${HOME}/.local/bin:${PATH}"
  python3 -m pip install --user "huggingface_hub[cli]>=0.23,<1.0"
run: |
  set -euo pipefail
  export PATH="${HOME}/.local/bin:${PATH}"
  test -n "${NPA_COSMOS3_SOURCE_REPO}"
  test -n "${NPA_COSMOS3_MODEL_ID}"
  hf_token_value="${!NPA_COSMOS3_HF_TOKEN_ENV-}"
  test -n "${hf_token_value}"
  if [ "${NPA_COSMOS3_REQUIRE_NGC}" = "1" ]; then
    ngc_token_value="${!NPA_COSMOS3_NGC_API_KEY_ENV-}"
    test -n "${ngc_token_value}"
  fi

  rm -rf "${NPA_COSMOS3_CACHE}"
  mkdir -p "${NPA_COSMOS3_CACHE}"
  github_token_value="${!NPA_COSMOS3_GITHUB_TOKEN_ENV-}"
  if [ -n "${github_token_value}" ]; then
    repo_host="$(python3 - <<'PY'
  import os
  from urllib.parse import urlparse

  print(urlparse(os.environ["NPA_COSMOS3_SOURCE_REPO"]).hostname or "github.com")
  PY
  )"
    export GIT_CONFIG_COUNT=1
    export GIT_CONFIG_KEY_0="http.https://${repo_host}/.extraheader"
    export GIT_CONFIG_VALUE_0="AUTHORIZATION: bearer ${github_token_value}"
  fi
  git clone --depth 1 "${NPA_COSMOS3_SOURCE_REPO}" "${NPA_COSMOS3_CACHE}/source"
  unset GIT_CONFIG_COUNT GIT_CONFIG_KEY_0 GIT_CONFIG_VALUE_0

  export HF_TOKEN="${hf_token_value}"
  export HUGGING_FACE_HUB_TOKEN="${hf_token_value}"
  huggingface-cli download "${NPA_COSMOS3_MODEL_ID}" --local-dir "${NPA_COSMOS3_CACHE}/checkpoint" --include "config.json"

  cd "${NPA_COSMOS3_CACHE}/source"
  uv sync --all-extras --group="${NPA_COSMOS3_UV_GROUP}"
  export LD_LIBRARY_PATH=
  .venv/bin/python -c "import cosmos_framework; print('cosmos_framework import ok')"
  .venv/bin/python - <<'PY'
  import json
  import os
  from pathlib import Path

  payload = {
      "status": "ok",
      "source_repo": os.environ["NPA_COSMOS3_SOURCE_REPO"],
      "model_id": os.environ["NPA_COSMOS3_MODEL_ID"],
      "uv_group": os.environ["NPA_COSMOS3_UV_GROUP"],
      "source_checkout": os.environ["NPA_COSMOS3_CACHE"] + "/source",
      "checkpoint_dir": os.environ["NPA_COSMOS3_CACHE"] + "/checkpoint",
  }
  path = Path(os.environ["NPA_COSMOS3_SETUP_JSON"])
  path.parent.mkdir(parents=True, exist_ok=True)
  path.write_text(json.dumps(payload, sort_keys=True) + "\n", encoding="utf-8")
  print(json.dumps(payload, sort_keys=True))
  PY

  if [ -n "${NPA_COSMOS3_OUTPUT_S3_URI}" ]; then
    if ! command -v aws >/dev/null 2>&1; then
      python3 -m pip install --user "awscli>=1.32"
    fi
    aws s3 cp "${NPA_COSMOS3_SETUP_JSON}" "${NPA_COSMOS3_OUTPUT_S3_URI%/}/setup.json"
  fi
