  cloud: kubernetes
  accelerators: H100:1
  cpus: 16
  memory: 64
  image_id: "docker:cr.eu-north1.nebius.cloud/YOUR_REGISTRY_ID/npa-detection-training:bdd100k-w9-detection-training-tool-20260516T173720Z"
envs:
  NPA_PIPELINE_RUN_ID: bdd100k-pipeline-dryrun
  S3_BUCKET: YOUR_S3_BUCKET
  S3_PREFIX: bdd100k-pipeline/bdd100k-pipeline-dryrun
  PIPELINE_ROOT_URI: s3://YOUR_S3_BUCKET/bdd100k-pipeline/bdd100k-pipeline-dryrun
  LANCE_URI: s3://YOUR_S3_BUCKET/bdd100k-pipeline/bdd100k-pipeline-dryrun/lancedb/
  VIEW_NAME: bdd100k_distant_person_train
  VIEW_SLUG: bdd100k_distant_person_train
  TRAIN_OUTPUT_URI: s3://YOUR_S3_BUCKET/bdd100k-pipeline/bdd100k-pipeline-dryrun/training/bdd100k_distant_person_train
  DETECTION_TRAINING_ENDPOINT: http://npa-detection-training.workbench.svc.cluster.local:8790
  DETECTION_TRAINING_TOKEN: ""
  TRAIN_NUM_CLASSES: "10"
  TRAIN_EPOCHS: "10"
  TRAIN_BATCH_SIZE: "8"
  TRAIN_LEARNING_RATE: "0.005"
  TRAIN_POLL_SECONDS: "30"
  TRAIN_TIMEOUT_SECONDS: "21600"
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends ca-certificates curl jq
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache ca-certificates curl jq
    elif command -v microdnf >/dev/null 2>&1; then
      microdnf install -y ca-certificates curl jq
    else
      echo "curl and jq are required for BDD100K pipeline tasks" >&2
      exit 1
    fi
  fi
run: |
  set -euo pipefail

  auth_args=()
  if [[ -n "${DETECTION_TRAINING_TOKEN:-}" ]]; then
    auth_args=(-H "Authorization: Bearer ${DETECTION_TRAINING_TOKEN}")
  fi

  post_detection() {
    local path="$1"
    local payload="$2"
    local output="$3"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" -X POST \
      "${DETECTION_TRAINING_ENDPOINT}${path}" \
      -H "Content-Type: application/json" \
      ${auth_args[@]+"${auth_args[@]}"} \
      --data "${payload}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  get_detection() {
    local path="$1"
    local output="$2"
    local code
    code=$(curl -sS -o "${output}" -w "%{http_code}" ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}${path}")
    if [[ "${code}" -lt 200 || "${code}" -ge 300 ]]; then
      echo "Detection-training ${path} failed with HTTP ${code}" >&2
      cat "${output}" >&2
      exit 1
    fi
    jq . "${output}"
  }

  curl -fsS ${auth_args[@]+"${auth_args[@]}"} "${DETECTION_TRAINING_ENDPOINT}/health" | jq -e '.status == "ok"'
  payload=$(jq -n \
    --arg view "${VIEW_NAME}" \
    --arg lance_uri "${LANCE_URI}" \
    --arg output_uri "${TRAIN_OUTPUT_URI}" \
    --argjson num_classes "${TRAIN_NUM_CLASSES}" \
    --argjson epochs "${TRAIN_EPOCHS}" \
    --argjson batch_size "${TRAIN_BATCH_SIZE}" \
    --argjson learning_rate "${TRAIN_LEARNING_RATE}" \
    '{view: $view, lance_uri: $lance_uri, output_uri: $output_uri, num_classes: $num_classes, epochs: $epochs, batch_size: $batch_size, learning_rate: $learning_rate}')
  post_detection "/train" "${payload}" train-response.json
  run_id=$(jq -r '.run_id' train-response.json)
  deadline=$((SECONDS + TRAIN_TIMEOUT_SECONDS))
  while true; do
    get_detection "/status?run_id=${run_id}" train-status.json
    status=$(jq -r '.status' train-status.json)
    if [[ "${status}" == "completed" ]]; then
      break
    fi
    if [[ "${status}" == "failed" ]]; then
      cat train-status.json >&2
      exit 1
    fi
    if (( SECONDS > deadline )); then
      echo "Training timed out for ${VIEW_NAME}" >&2
      cat train-status.json >&2
      exit 1
    fi
    sleep "${TRAIN_POLL_SECONDS}"
  done
  jq -e '.status == "completed" and .epochs_completed == .total_epochs and .checkpoint_uri_pattern != ""' train-status.json
