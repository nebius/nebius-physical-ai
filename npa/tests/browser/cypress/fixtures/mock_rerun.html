<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mock Rerun</title>
    <style>
      html, body { margin: 0; background: #050508; color: #e2e8f0; font: 14px sans-serif; }
      #splash { display: none; padding: 24px; }
      #splash.is-on { display: block; }
      canvas { display: block; width: 100%; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="splash">Loading application bundle…</div>
    <canvas data-testid="mock-rerun-canvas" id="mockCanvas"></canvas>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const mode = String(params.get("mode") || "content");
        const splash = document.getElementById("splash");
        const canvas = document.getElementById("mockCanvas");
        const w = 640;
        const h = 400;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");

        function paintGray() {
          ctx.fillStyle = "#9ca3af";
          ctx.fillRect(0, 0, w, h);
        }

        function paintContent() {
          // Dark 3D-ish grid + orange/cyan skeleton — mirrors locomotion / G1 trajectory views.
          ctx.fillStyle = "#0a0a12";
          ctx.fillRect(0, 0, w, h);
          ctx.strokeStyle = "#5b6472";
          ctx.lineWidth = 1;
          for (let x = 40; x < w; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, h);
            ctx.lineTo(x * 0.7 + 80, 80);
            ctx.stroke();
          }
          for (let y = 80; y < h; y += 28) {
            ctx.beginPath();
            ctx.moveTo(20, y);
            ctx.lineTo(w - 20, y + 10);
            ctx.stroke();
          }
          function bone(color, points) {
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(points[0][0], points[0][1]);
            for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i][0], points[i][1]);
            ctx.stroke();
            for (const p of points) {
              ctx.beginPath();
              ctx.arc(p[0], p[1], 4, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          bone("#ff8a1f", [[320, 90], [320, 150], [300, 210], [290, 280], [285, 340]]);
          bone("#ff8a1f", [[320, 150], [360, 190], [390, 230]]);
          bone("#ff8a1f", [[320, 150], [280, 190], [250, 230]]);
          bone("#5eead4", [[325, 95], [328, 155], [310, 215], [305, 285], [300, 345]]);
          bone("#5eead4", [[328, 155], [365, 195], [395, 240]]);
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "12px sans-serif";
          ctx.fillText("G1 trajectory", 12, 22);
        }

        window.__NPA_MOCK_RERUN__ = {
          mode,
          setMode(next) {
            const m = String(next || "content");
            this.mode = m;
            if (m === "splash") {
              splash.classList.add("is-on");
              splash.textContent = "Loading application bundle…";
              paintGray();
            } else if (m === "gray") {
              splash.classList.remove("is-on");
              paintGray();
            } else {
              splash.classList.remove("is-on");
              paintContent();
            }
            window.parent && window.parent.postMessage("READY", "*");
          },
          paintContent,
          paintGray,
        };

        window.__NPA_MOCK_RERUN__.setMode(mode);
      })();
    </script>
  </body>
</html>
