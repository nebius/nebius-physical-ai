# SONIC G1 first-milestone pipeline.
#
# Retarget source motion, fine-tune G1 from the released SONIC checkpoint,
# then run a MuJoCo rollout that consumes the fine-tuned checkpoint.
name: sonic-locomotion-finetuning
execution: serial
---
name: sonic-retarget-motion
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  # NPA_RETARGETING_IMAGE is BYO-overridable. The default is a CPU preprocess
  # image with npa plus upstream SONIC data_process scripts.
  image_id: "docker:${NPA_RETARGETING_IMAGE}"
envs:
  NPA_RETARGETING_IMAGE: "cr.eu-north1.nebius.cloud/e00cm0vc6t09m0z5gw/npa-retargeting:0.1.0"
  NPA_RETARGETING_UPSTREAM_REF: "a9d20b2ac0949244d94461a1a3263f38c5027c4a"
  NPA_PIPELINE_RUN_ID: "<run-id>"
  INPUT_MOTION_URI: "s3://<your-bucket-name>/motions/source/"
  RETARGETED_MOTION_URI: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/retargeted/"
  SOURCE_FORMAT: "auto"
  SONIC_EMBODIMENT: "unitree-g1"
  RETARGET_MAP_URI: ""
  RETARGET_FRAME_RATE: "30"
  RETARGET_SOURCE_FRAME_RATE: "120"
  RETARGET_MAX_FRAMES: "0"
  RETARGET_NUM_WORKERS: "4"
  RETARGET_INDIVIDUAL: "1"
  AWS_PROFILE: "nebius"
  S3_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  NPA_DRY_RUN: "0"
setup: |
  set -euo pipefail
  npa --version
run: |
  set -euo pipefail
  export AWS_PROFILE="${AWS_PROFILE:-nebius}"
  export AWS_ENDPOINT_URL="${AWS_ENDPOINT_URL:-${S3_ENDPOINT_URL:-https://storage.eu-north1.nebius.cloud}}"
  export NEBIUS_S3_ENDPOINT="${NEBIUS_S3_ENDPOINT:-${AWS_ENDPOINT_URL}}"
  cmd=(npa workbench retargeting run \
    --input-path "${INPUT_MOTION_URI}" \
    --output-path "${RETARGETED_MOTION_URI}" \
    --source-format "${SOURCE_FORMAT}" \
    --embodiment "${SONIC_EMBODIMENT}" \
    --retarget-map "${RETARGET_MAP_URI}" \
    --frame-rate "${RETARGET_FRAME_RATE}" \
    --source-frame-rate "${RETARGET_SOURCE_FRAME_RATE}" \
    --max-frames "${RETARGET_MAX_FRAMES}" \
    --num-workers "${RETARGET_NUM_WORKERS}" \
    --output json)
  if [ "${RETARGET_INDIVIDUAL}" = "1" ]; then
    cmd+=(--individual)
  else
    cmd+=(--combined)
  fi
  "${cmd[@]}"
---
name: sonic-g1-finetune
resources:
  cloud: nebius
  region: eu-north1
  accelerators: H100:1
  use_spot: true
  cpus: 16
  memory: 200
  image_id: "docker:example.invalid/npa-sonic-mujoco:0.1.3-mvp"
envs:
  POLICY_IMAGE: "example.invalid/npa-sonic-mujoco:0.1.3-mvp"
  SONIC_PAYLOAD_MODE: "direct"
  SONIC_GPU_TYPE: "h100"
  SONIC_IMAGE_VARIANT: "sonic-mujoco-h100-mvp"
  AWS_PROFILE: "nebius"
  S3_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  S3_BUCKET: "<your-bucket-name>"
  NPA_PIPELINE_RUN_ID: "<run-id>"
  RETARGETED_MOTION_URI: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/retargeted/"
  SONIC_OUTPUT_PREFIX: "sonic-locomotion/<run-id>/training/"
  SONIC_TRAIN_OUTPUT_URI: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/training/"
  SONIC_DATA_PATH: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/retargeted/"
  SONIC_TRAIN_MODE: "finetune"
  SONIC_RUN_REAL_TRAIN: "1"
  SONIC_RESUME: "False"
  SONIC_CHECKPOINT: "nvidia/GEAR-SONIC:sonic_release/last.pt"
  SONIC_CHECKPOINT_PATH: "sonic_release/last.pt"
  SONIC_DOWNLOAD_TRAINING_CHECKPOINT: "1"
  SONIC_DOWNLOAD_SAMPLE_DATA: "1"
  SONIC_SAMPLE_DATA: "1"
  SONIC_MOTION_FILE: "sample_data/robot_filtered"
  SONIC_SMPL_MOTION_FILE: "sample_data/smpl_filtered"
  SONIC_EMBODIMENT: "UNITREE_G1_SONIC"
  SONIC_NUM_ENVS: "4"
  SONIC_NUM_STEPS_PER_ENV: "2"
  SONIC_HEADLESS: "True"
  SONIC_MAX_ITERATIONS: "1"
  SONIC_SAVE_LAST_FREQUENCY: "1"
  SONIC_SAVE_FREQUENCY: "1"
  SONIC_RUNTIME_INSTALL_TRAINING_DEPS: "1"
  WANDB_MODE: "disabled"
  WANDB_DISABLED: "true"
  WANDB_SILENT: "true"
  MUJOCO_GL: "egl"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  docker_cmd() {
    if docker version >/dev/null 2>&1; then
      docker "$@"
    elif command -v sudo >/dev/null 2>&1; then
      sudo -E docker "$@"
    else
      docker "$@"
    fi
  }
  docker_login_if_configured() {
    local username="${SKYPILOT_DOCKER_USERNAME:-}"
    local password="${SKYPILOT_DOCKER_PASSWORD:-}"
    local server="${SKYPILOT_DOCKER_SERVER:-}"
    if [ -z "${username}${password}${server}" ]; then
      return 0
    fi
    if [ -z "${username}" ] || [ -z "${password}" ] || [ -z "${server}" ]; then
      echo "Docker registry auth requires SKYPILOT_DOCKER_USERNAME, SKYPILOT_DOCKER_PASSWORD, and SKYPILOT_DOCKER_SERVER" >&2
      exit 2
    fi
    printf '%s\n' "${password}" | docker_cmd login "${server}" --username "${username}" --password-stdin >/dev/null
  }
  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    command -v docker >/dev/null 2>&1 || {
      echo "SONIC_PAYLOAD_MODE=docker requires docker in the SkyPilot runtime" >&2
      exit 2
    }
    docker_login_if_configured
    docker_cmd pull "${POLICY_IMAGE}"
    export SONIC_IMAGE_REPO_DIGESTS="$(docker_cmd image inspect "${POLICY_IMAGE}" --format '{{join .RepoDigests ","}}' || true)"
    printf 'SONIC_IMAGE_PULL policy_image=%s repo_digests=%s\n' "${POLICY_IMAGE}" "${SONIC_IMAGE_REPO_DIGESTS}"
  elif [ ! -x /entrypoint.sh ]; then
    echo "The selected POLICY_IMAGE must provide the SONIC /entrypoint.sh runtime" >&2
    exit 2
  fi
run: |
  set -euo pipefail
  docker_cmd() {
    if docker version >/dev/null 2>&1; then
      docker "$@"
    elif command -v sudo >/dev/null 2>&1; then
      sudo -E docker "$@"
    else
      docker "$@"
    fi
  }
  install_training_deps_if_requested() {
    if [ "${SONIC_RUNTIME_INSTALL_TRAINING_DEPS:-1}" != "1" ]; then
      return 0
    fi
    local python_bin="${NPA_PYTHON_BIN:-/isaac-sim/python.sh}"
    "${python_bin}" -m pip show open3d vector-quantize-pytorch >/dev/null 2>&1 || \
      "${python_bin}" -m pip install --user --no-cache-dir \
        "open3d>=0.18,<0.20" \
        "vector-quantize-pytorch>=1.14,<2"
  }
  placeholder_bucket="$(printf '<%s-%s-%s>' your bucket name)"
  if [ -z "${S3_BUCKET}" ] || [ "${S3_BUCKET}" = "${placeholder_bucket}" ]; then
    echo "S3_BUCKET must be provided by the operator" >&2
    exit 2
  fi
  export AWS_PROFILE="${AWS_PROFILE:-nebius}"
  export AWS_ENDPOINT_URL="${AWS_ENDPOINT_URL:-${S3_ENDPOINT_URL:-https://storage.eu-north1.nebius.cloud}}"
  export S3_ENDPOINT_URL="${S3_ENDPOINT_URL:-${AWS_ENDPOINT_URL}}"
  export NEBIUS_S3_ENDPOINT="${NEBIUS_S3_ENDPOINT:-${AWS_ENDPOINT_URL}}"
  export NPA_OUTPUT_PATH="s3://${S3_BUCKET}/${SONIC_OUTPUT_PREFIX}"
  export NPA_LOCAL_OUTPUT_DIR="${NPA_LOCAL_OUTPUT_DIR:-/tmp/npa-sonic-output}"
  export SONIC_POLICY_IMAGE="${POLICY_IMAGE}"
  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    export SONIC_IMAGE_REPO_DIGESTS="$(docker_cmd image inspect "${POLICY_IMAGE}" --format '{{join .RepoDigests ","}}' || true)"
  else
    export SONIC_IMAGE_REPO_DIGESTS="${SONIC_IMAGE_REPO_DIGESTS:-}"
  fi

  printf 'SONIC_MVP_FINE_TUNE policy_image=%s gpu_type=%s output=%s\n' \
    "${POLICY_IMAGE}" "${SONIC_GPU_TYPE}" "${NPA_OUTPUT_PATH}"

  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    docker_cmd run --rm --gpus all --ipc=host --network=host \
      -e AWS_ACCESS_KEY_ID \
      -e AWS_SECRET_ACCESS_KEY \
      -e AWS_PROFILE \
      -e AWS_ENDPOINT_URL \
      -e S3_ENDPOINT_URL \
      -e NEBIUS_S3_ENDPOINT \
      -e HF_TOKEN \
      -e NPA_OUTPUT_PATH \
      -e NPA_LOCAL_OUTPUT_DIR \
      -e SONIC_POLICY_IMAGE \
      -e SONIC_IMAGE_REPO_DIGESTS \
      -e SONIC_PAYLOAD_MODE \
      -e SONIC_TRAIN_MODE \
      -e SONIC_RUN_REAL_TRAIN \
      -e SONIC_RESUME \
      -e SONIC_CHECKPOINT \
      -e SONIC_CHECKPOINT_PATH \
      -e SONIC_DOWNLOAD_TRAINING_CHECKPOINT \
      -e SONIC_DOWNLOAD_SAMPLE_DATA \
      -e SONIC_SAMPLE_DATA \
      -e SONIC_MOTION_FILE \
      -e SONIC_SMPL_MOTION_FILE \
      -e SONIC_EMBODIMENT \
      -e SONIC_NUM_ENVS \
      -e SONIC_NUM_STEPS_PER_ENV \
      -e SONIC_HEADLESS \
      -e SONIC_MAX_ITERATIONS \
      -e SONIC_SAVE_LAST_FREQUENCY \
      -e SONIC_SAVE_FREQUENCY \
      -e SONIC_RUNTIME_INSTALL_TRAINING_DEPS \
      -e WANDB_MODE \
      -e WANDB_DISABLED \
      -e WANDB_SILENT \
      -e MUJOCO_GL \
      --entrypoint /bin/bash \
      "${POLICY_IMAGE}" -lc '
        set -euo pipefail
        if [ "${SONIC_RUNTIME_INSTALL_TRAINING_DEPS:-1}" = "1" ]; then
          python_bin="${NPA_PYTHON_BIN:-/isaac-sim/python.sh}"
          "${python_bin}" -m pip show open3d vector-quantize-pytorch >/dev/null 2>&1 || \
            "${python_bin}" -m pip install --user --no-cache-dir \
              "open3d>=0.18,<0.20" \
              "vector-quantize-pytorch>=1.14,<2"
        fi
        exec /entrypoint.sh finetune
      '
  else
    install_training_deps_if_requested
    /entrypoint.sh finetune
  fi
---
name: sonic-mujoco-eval
resources:
  cloud: nebius
  region: eu-north1
  accelerators: H100:1
  use_spot: true
  cpus: 16
  memory: 200
  image_id: "docker:example.invalid/npa-sonic-mujoco:0.1.3-mvp"
envs:
  POLICY_IMAGE: "example.invalid/npa-sonic-mujoco:0.1.3-mvp"
  SONIC_PAYLOAD_MODE: "direct"
  SONIC_GPU_TYPE: "h100"
  SONIC_IMAGE_VARIANT: "sonic-mujoco-h100-mvp"
  AWS_PROFILE: "nebius"
  S3_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
  S3_BUCKET: "<your-bucket-name>"
  NPA_PIPELINE_RUN_ID: "<run-id>"
  SONIC_OUTPUT_PREFIX: "sonic-locomotion/<run-id>/mujoco-eval/"
  SONIC_FINE_TUNED_CHECKPOINT_URI: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/training/checkpoints/last.pt"
  SONIC_MUJOCO_OUTPUT_URI: "s3://<your-bucket-name>/sonic-locomotion/<run-id>/mujoco-eval/"
  SONIC_EMBODIMENT: "UNITREE_G1_SONIC"
  SONIC_MUJOCO_EPISODES: "1"
  SONIC_MUJOCO_STEPS: "64"
  MUJOCO_GL: "egl"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  docker_cmd() {
    if docker version >/dev/null 2>&1; then
      docker "$@"
    elif command -v sudo >/dev/null 2>&1; then
      sudo -E docker "$@"
    else
      docker "$@"
    fi
  }
  docker_login_if_configured() {
    local username="${SKYPILOT_DOCKER_USERNAME:-}"
    local password="${SKYPILOT_DOCKER_PASSWORD:-}"
    local server="${SKYPILOT_DOCKER_SERVER:-}"
    if [ -z "${username}${password}${server}" ]; then
      return 0
    fi
    if [ -z "${username}" ] || [ -z "${password}" ] || [ -z "${server}" ]; then
      echo "Docker registry auth requires SKYPILOT_DOCKER_USERNAME, SKYPILOT_DOCKER_PASSWORD, and SKYPILOT_DOCKER_SERVER" >&2
      exit 2
    fi
    printf '%s\n' "${password}" | docker_cmd login "${server}" --username "${username}" --password-stdin >/dev/null
  }
  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    command -v docker >/dev/null 2>&1 || {
      echo "SONIC_PAYLOAD_MODE=docker requires docker in the SkyPilot runtime" >&2
      exit 2
    }
    docker_login_if_configured
    docker_cmd pull "${POLICY_IMAGE}"
    export SONIC_IMAGE_REPO_DIGESTS="$(docker_cmd image inspect "${POLICY_IMAGE}" --format '{{join .RepoDigests ","}}' || true)"
    printf 'SONIC_IMAGE_PULL policy_image=%s repo_digests=%s\n' "${POLICY_IMAGE}" "${SONIC_IMAGE_REPO_DIGESTS}"
  elif [ ! -x /entrypoint.sh ]; then
    echo "The selected POLICY_IMAGE must provide the SONIC /entrypoint.sh runtime" >&2
    exit 2
  fi
run: |
  set -euo pipefail
  docker_cmd() {
    if docker version >/dev/null 2>&1; then
      docker "$@"
    elif command -v sudo >/dev/null 2>&1; then
      sudo -E docker "$@"
    else
      docker "$@"
    fi
  }
  placeholder_bucket="$(printf '<%s-%s-%s>' your bucket name)"
  if [ -z "${S3_BUCKET}" ] || [ "${S3_BUCKET}" = "${placeholder_bucket}" ]; then
    echo "S3_BUCKET must be provided by the operator" >&2
    exit 2
  fi
  export AWS_PROFILE="${AWS_PROFILE:-nebius}"
  export AWS_ENDPOINT_URL="${AWS_ENDPOINT_URL:-${S3_ENDPOINT_URL:-https://storage.eu-north1.nebius.cloud}}"
  export S3_ENDPOINT_URL="${S3_ENDPOINT_URL:-${AWS_ENDPOINT_URL}}"
  export NEBIUS_S3_ENDPOINT="${NEBIUS_S3_ENDPOINT:-${AWS_ENDPOINT_URL}}"
  export NPA_OUTPUT_PATH="s3://${S3_BUCKET}/${SONIC_OUTPUT_PREFIX}"
  export NPA_LOCAL_OUTPUT_DIR="${NPA_LOCAL_OUTPUT_DIR:-/tmp/npa-sonic-mujoco-eval}"
  export NPA_SONIC_OUTPUT="${NPA_SONIC_OUTPUT:-${NPA_LOCAL_OUTPUT_DIR}/mujoco_eval_metrics.json}"
  export SONIC_MUJOCO_METRICS_PATH="${SONIC_MUJOCO_METRICS_PATH:-${NPA_SONIC_OUTPUT}}"
  export SONIC_POLICY_IMAGE="${POLICY_IMAGE}"
  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    export SONIC_IMAGE_REPO_DIGESTS="$(docker_cmd image inspect "${POLICY_IMAGE}" --format '{{join .RepoDigests ","}}' || true)"
  else
    export SONIC_IMAGE_REPO_DIGESTS="${SONIC_IMAGE_REPO_DIGESTS:-}"
  fi

  printf 'SONIC_MVP_MUJOCO_EVAL policy_image=%s checkpoint=%s output=%s\n' \
    "${POLICY_IMAGE}" "${SONIC_FINE_TUNED_CHECKPOINT_URI}" "${NPA_OUTPUT_PATH}"

  if [ "${SONIC_PAYLOAD_MODE}" = "docker" ]; then
    docker_cmd run --rm --gpus all --ipc=host --network=host \
      -e AWS_ACCESS_KEY_ID \
      -e AWS_SECRET_ACCESS_KEY \
      -e AWS_PROFILE \
      -e AWS_ENDPOINT_URL \
      -e S3_ENDPOINT_URL \
      -e NEBIUS_S3_ENDPOINT \
      -e NPA_OUTPUT_PATH \
      -e NPA_LOCAL_OUTPUT_DIR \
      -e NPA_SONIC_OUTPUT \
      -e SONIC_MUJOCO_METRICS_PATH \
      -e SONIC_POLICY_IMAGE \
      -e SONIC_IMAGE_REPO_DIGESTS \
      -e SONIC_PAYLOAD_MODE \
      -e SONIC_FINE_TUNED_CHECKPOINT_URI \
      -e SONIC_EMBODIMENT \
      -e SONIC_MUJOCO_EPISODES \
      -e SONIC_MUJOCO_STEPS \
      -e MUJOCO_GL \
      "${POLICY_IMAGE}" mujoco-eval
  else
    /entrypoint.sh mujoco-eval
  fi
