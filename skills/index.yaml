    path: skills/workflows/agent-fresh-operate/SKILL.md
    smoke:
      - type: file_exists
        path: npa/scripts/agent_fresh_setup_loop.sh
      - type: cli_help
        args: ["agent", "fresh-setup", "--help"]
        contains: "project-id"
      - type: cli_help
        args: ["agent", "destroy", "--help"]
        contains: "Destroy agent VM"
