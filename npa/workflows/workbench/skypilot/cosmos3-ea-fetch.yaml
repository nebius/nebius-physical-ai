# Cosmos3-EA Phase 1 fetch workflow.
#
# This workflow checks gated source + HF checkpoint access and materializes both
# into node-local ephemeral storage. Supply all gated identifiers and credentials
# at launch time; do not fill real values into this committed YAML.
name: cosmos3-ea-fetch
execution: serial
---
name: cosmos3-fetch
resources:
  cloud: kubernetes
  cpus: 8
  memory: 32
  disk_size: 512
  # Replace with an image that includes the npa CLI, git, and a Python runtime.
  image_id: "docker:cr.eu-north1.nebius.cloud/<your-registry-id>/npa-workbench:<tag>"
envs:
  # Runtime config. Replace placeholders at launch via SkyPilot env/secrets.
  NPA_COSMOS3_SOURCE_REPO: "<gated-source-repo-url>"
  NPA_COSMOS3_MODEL_ID: "<gated-hf-model-id>"
  NPA_COSMOS3_CACHE: "/tmp/npa-cosmos3-cache"
  NPA_COSMOS3_GITHUB_TOKEN_ENV: "GITHUB_TOKEN"
  NPA_COSMOS3_HF_TOKEN_ENV: "HF_TOKEN"
  NPA_COSMOS3_NGC_API_KEY_ENV: "NGC_API_KEY"
  NPA_COSMOS3_REQUIRE_NGC: "0"

  # Serve config carried forward for Phase 2.
  NPA_COSMOS3_REASONING_PARSER: "qwen3"
  NPA_COSMOS3_TOOL_CALL_PARSER: "hermes"
setup: |
  set -euo pipefail
  if ! command -v git >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends git curl ca-certificates
    else
      echo "git is required for Cosmos3 source checkout" >&2
      exit 1
    fi
  fi
  if ! command -v npa >/dev/null 2>&1 && [ -d /opt/nebius-physical-ai/npa ]; then
    python3 -m pip install -e /opt/nebius-physical-ai/npa
  fi
  if ! command -v huggingface-cli >/dev/null 2>&1; then
    python3 -m pip install "huggingface_hub[cli]>=0.23"
  fi
run: |
  set -euo pipefail

  test -n "${NPA_COSMOS3_SOURCE_REPO}" && test "${NPA_COSMOS3_SOURCE_REPO}" != "<gated-source-repo-url>"
  test -n "${NPA_COSMOS3_MODEL_ID}" && test "${NPA_COSMOS3_MODEL_ID}" != "<gated-hf-model-id>"
  hf_token_value="${!NPA_COSMOS3_HF_TOKEN_ENV-}"
  test -n "${hf_token_value}"

  if [ "${NPA_COSMOS3_REQUIRE_NGC}" = "1" ]; then
    ngc_token_value="${!NPA_COSMOS3_NGC_API_KEY_ENV-}"
    test -n "${ngc_token_value}"
  fi
  github_token_value="${!NPA_COSMOS3_GITHUB_TOKEN_ENV-}"
  if [ -z "${github_token_value}" ] && command -v gh >/dev/null 2>&1; then
    gh auth status >/dev/null
  fi

  npa workbench cosmos check \
    --source-repo-url "${NPA_COSMOS3_SOURCE_REPO}" \
    --model-id "${NPA_COSMOS3_MODEL_ID}" \
    --cache-dir "${NPA_COSMOS3_CACHE}" \
    --github-token-env "${NPA_COSMOS3_GITHUB_TOKEN_ENV}" \
    --hf-token-env "${NPA_COSMOS3_HF_TOKEN_ENV}" \
    --ngc-api-key-env "${NPA_COSMOS3_NGC_API_KEY_ENV}" \
    --reasoning-parser "${NPA_COSMOS3_REASONING_PARSER}" \
    --tool-call-parser "${NPA_COSMOS3_TOOL_CALL_PARSER}" \
    --output json

  npa workbench cosmos fetch \
    --source-repo-url "${NPA_COSMOS3_SOURCE_REPO}" \
    --model-id "${NPA_COSMOS3_MODEL_ID}" \
    --cache-dir "${NPA_COSMOS3_CACHE}" \
    --github-token-env "${NPA_COSMOS3_GITHUB_TOKEN_ENV}" \
    --hf-token-env "${NPA_COSMOS3_HF_TOKEN_ENV}" \
    --ngc-api-key-env "${NPA_COSMOS3_NGC_API_KEY_ENV}" \
    --reasoning-parser "${NPA_COSMOS3_REASONING_PARSER}" \
    --tool-call-parser "${NPA_COSMOS3_TOOL_CALL_PARSER}" \
    --output json

  echo "Cosmos3 gated artifacts are staged in ${NPA_COSMOS3_CACHE}"
