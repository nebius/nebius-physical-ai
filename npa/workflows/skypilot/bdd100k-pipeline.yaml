---
# Stage 4: create the three failure-mode materialized views used for training.
name: bdd100k-create-mvs
resources:
  cloud: kubernetes
  cpus: 4
  memory: 16
  image_id: "docker:cr.eu-north1.nebius.cloud/YOUR_REGISTRY_ID/npa-lancedb:bdd100k-clip-w9bdd100k-clip-embedding-20260516T174407Z"
envs:
  NPA_PIPELINE_RUN_ID: bdd100k-pipeline-dryrun
  S3_BUCKET: YOUR_S3_BUCKET
  S3_PREFIX: bdd100k-pipeline/bdd100k-pipeline-dryrun
  PIPELINE_ROOT_URI: s3://YOUR_S3_BUCKET/bdd100k-pipeline/bdd100k-pipeline-dryrun
  LANCE_URI: s3://YOUR_S3_BUCKET/bdd100k-pipeline/bdd100k-pipeline-dryrun/lancedb/
  LANCE_TABLE: bdd100k
  LANCEDB_ENDPOINT: http://npa-lancedb.workbench.svc.cluster.local:8686
  LANCEDB_TOKEN: ""
setup: |
  set -e
  if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
