# Standalone Cosmos controlled-generation augmentation workflow.
#
# Run with plain SkyPilot, overriding the image, GPU, input, and output:
#   sky launch --infra nebius --gpus <gpu-type>:1 \
#     --env NPA_COSMOS2_TRANSFER_IMAGE=<registry>/npa-cosmos2-transfer:<tag-or-digest> \
#     --env NPA_COSMOS_AUGMENT_SOURCE=s3://example-bucket/input/sim.mp4 \
#     --env NPA_COSMOS_AUGMENT_OUTPUT=s3://example-bucket/output/cosmos-augment/ \
#     --secret HF_TOKEN \
#     npa/workflows/workbench/skypilot/cosmos3-augment.yaml
#
# The Cosmos image is run explicitly with docker on the VM. Do not use
# SkyPilot's docker image_id mode here; that mode SSHes into the container.
name: cosmos3-augment
resources:
  cloud: kubernetes
  cpus: 16+
  memory: 128+
  disk_size: 1024
envs:
  NPA_COSMOS2_TRANSFER_IMAGE: "example.invalid/npa-cosmos2-transfer:2.5.0"
  NPA_COSMOS_AUGMENT_SOURCE: "s3://example-bucket/cosmos/input/sim-render.mp4"
  NPA_COSMOS_AUGMENT_OUTPUT: "s3://example-bucket/cosmos/output/augment/"
  NPA_COSMOS_AUGMENT_PROMPT: "A photorealistic robotics workspace preserving the source motion and object layout."
  NPA_COSMOS_AUGMENT_CONTROL: "edge"
  NPA_COSMOS_AUGMENT_CONTROL_CONFIG: "{}"
  NPA_COSMOS_AUGMENT_MODEL_SIZE: "transfer2.5-2b"
  NPA_COSMOS_AUGMENT_VARIANTS: "1"
  NPA_COSMOS_REPLICAS: "1"
  NPA_COSMOS_TRANSFER_SOURCE_REPO: "https://github.com/nvidia-cosmos/cosmos-transfer2.5.git"
  NPA_COSMOS_TRANSFER_MODEL_ID: "nvidia/Cosmos-Transfer2.5-2B"
  NPA_COSMOS_TRANSFER_CUDA_EXTRA: "cu128"
  NPA_COSMOS_HF_TOKEN_ENV: "HF_TOKEN"
  NPA_COSMOS_CACHE: "/tmp/npa-cosmos-cache"
  NPA_COSMOS_OUTPUT_DIR: "/tmp/npa-cosmos-augment"
  NPA_COSMOS_ATTRIBUTION: "Built on NVIDIA Cosmos"
  AWS_ENDPOINT_URL: ""
  AWS_PROFILE: ""
setup: |
  set -euo pipefail
  run_root() {
    if [ "$(id -u)" = "0" ]; then
      "$@"
    else
      sudo "$@"
    fi
  }
  if ! command -v docker >/dev/null 2>&1; then
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      run_root apt-get update
      run_root apt-get install -y --no-install-recommends ca-certificates curl docker.io
    else
      echo "docker is required to run the Cosmos image" >&2
      exit 1
    fi
  fi
  if command -v systemctl >/dev/null 2>&1; then
    run_root systemctl start docker >/dev/null 2>&1 || true
  else
    run_root service docker start >/dev/null 2>&1 || true
  fi
  if command -v nvidia-ctk >/dev/null 2>&1; then
    run_root nvidia-ctk runtime configure --runtime=docker >/dev/null 2>&1 || true
    if command -v systemctl >/dev/null 2>&1; then
      run_root systemctl restart docker >/dev/null 2>&1 || true
    else
      run_root service docker restart >/dev/null 2>&1 || true
    fi
  fi
run: |
  set -euo pipefail

  docker_cmd=(docker)
  if ! docker info >/dev/null 2>&1; then
    docker_cmd=(sudo docker)
  fi

  test -n "${NPA_COSMOS2_TRANSFER_IMAGE}"
  test -n "${NPA_COSMOS_AUGMENT_SOURCE}"
  test -n "${NPA_COSMOS_AUGMENT_OUTPUT}"
  test -n "${NPA_COSMOS_AUGMENT_CONTROL}"
  test -n "${NPA_COSMOS_REPLICAS}"

  hf_token_value="${!NPA_COSMOS_HF_TOKEN_ENV-}"
  test -n "${hf_token_value}"
  export HF_TOKEN="${hf_token_value}"
  export HUGGING_FACE_HUB_TOKEN="${hf_token_value}"

  if [ -n "${SKYPILOT_DOCKER_SERVER:-}" ] || [ -n "${SKYPILOT_DOCKER_USERNAME:-}" ] || [ -n "${SKYPILOT_DOCKER_PASSWORD:-}" ]; then
    test -n "${SKYPILOT_DOCKER_SERVER:-}"
    test -n "${SKYPILOT_DOCKER_USERNAME:-}"
    test -n "${SKYPILOT_DOCKER_PASSWORD:-}"
    printf '%s' "${SKYPILOT_DOCKER_PASSWORD}" | "${docker_cmd[@]}" login "${SKYPILOT_DOCKER_SERVER}" -u "${SKYPILOT_DOCKER_USERNAME}" --password-stdin
  fi

  "${docker_cmd[@]}" pull "${NPA_COSMOS2_TRANSFER_IMAGE}"

  job_dir="/tmp/npa-cosmos-augment-docker"
  rm -rf "${job_dir}"
  mkdir -p "${job_dir}"
  chmod 700 "${job_dir}"

  env_file="${job_dir}/container.env"
  : > "${env_file}"
  chmod 600 "${env_file}"
  write_env() {
    key="$1"
    value="${!key-}"
    if [ -n "${value}" ]; then
      printf '%s=%s\n' "${key}" "${value}" >> "${env_file}"
    fi
  }
  for key in \
    AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN AWS_ENDPOINT_URL AWS_PROFILE \
    HF_TOKEN HUGGING_FACE_HUB_TOKEN \
    NPA_COSMOS2_TRANSFER_IMAGE NPA_COSMOS_AUGMENT_SOURCE NPA_COSMOS_AUGMENT_OUTPUT \
    NPA_COSMOS_AUGMENT_PROMPT NPA_COSMOS_AUGMENT_CONTROL \
    NPA_COSMOS_AUGMENT_CONTROL_CONFIG NPA_COSMOS_AUGMENT_MODEL_SIZE \
    NPA_COSMOS_AUGMENT_VARIANTS NPA_COSMOS_REPLICAS \
    NPA_COSMOS_TRANSFER_SOURCE_REPO NPA_COSMOS_TRANSFER_MODEL_ID \
    NPA_COSMOS_TRANSFER_CUDA_EXTRA \
    NPA_COSMOS_HF_TOKEN_ENV NPA_COSMOS_CACHE NPA_COSMOS_OUTPUT_DIR \
    NPA_COSMOS_ATTRIBUTION; do
    write_env "${key}"
  done

  cat > "${job_dir}/run-container.sh" <<'NPA_COSMOS_CONTAINER'
  #!/usr/bin/env bash
  set -euo pipefail
  export PATH="${COSMOS_TRANSFER25_HOME:-/workspace}/.venv/bin:/usr/local/bin:${HOME}/.local/bin:${PATH}"
  export HF_HOME="${NPA_COSMOS_CACHE}/hf"
  export HUGGINGFACE_HUB_CACHE="${NPA_COSMOS_CACHE}/hf"

  test -n "${NPA_COSMOS2_TRANSFER_IMAGE}"
  test -n "${NPA_COSMOS_AUGMENT_SOURCE}"
  test -n "${NPA_COSMOS_AUGMENT_OUTPUT}"
  test -n "${NPA_COSMOS_AUGMENT_CONTROL}"
  test -n "${NPA_COSMOS_REPLICAS}"
  if [ -n "${AWS_ENDPOINT_URL}" ]; then
    export AWS_ENDPOINT_URL
  fi
  aws_s3_cp() {
    if [ -n "${AWS_ENDPOINT_URL}" ]; then
      aws --endpoint-url "${AWS_ENDPOINT_URL}" s3 cp "$@"
    else
      aws s3 cp "$@"
    fi
  }
  hf_token_value="${!NPA_COSMOS_HF_TOKEN_ENV-}"
  test -n "${hf_token_value}"
  export HF_TOKEN="${hf_token_value}"
  export HUGGING_FACE_HUB_TOKEN="${hf_token_value}"

  rm -rf "${NPA_COSMOS_CACHE}" "${NPA_COSMOS_OUTPUT_DIR}"
  mkdir -p "${NPA_COSMOS_CACHE}" "${NPA_COSMOS_OUTPUT_DIR}"

  transfer_dir="${COSMOS_TRANSFER25_HOME:-/workspace}"
  if [ "${NPA_COSMOS_TRANSFER_SOURCE_REPO}" != "https://github.com/nvidia-cosmos/cosmos-transfer2.5.git" ] || [ ! -d "${transfer_dir}/examples" ]; then
    transfer_dir="${NPA_COSMOS_CACHE}/transfer25"
    git clone --depth 1 "${NPA_COSMOS_TRANSFER_SOURCE_REPO}" "${transfer_dir}"
    cd "${transfer_dir}"
    printf '3.10\n' > .python-version
    uv sync --locked --python 3.10 --extra="${NPA_COSMOS_TRANSFER_CUDA_EXTRA:-cu128}"
  else
    cd "${transfer_dir}"
  fi
  if command -v git-lfs >/dev/null 2>&1; then
    git lfs install --local
  fi
  export LD_LIBRARY_PATH=

  input_dir="${NPA_COSMOS_OUTPUT_DIR}/inputs"
  mkdir -p "${input_dir}"
  source_local="${input_dir}/source$(python - <<'PY'
  import os
  from pathlib import Path
  suffix = Path(os.environ["NPA_COSMOS_AUGMENT_SOURCE"].split("?", 1)[0]).suffix or ".mp4"
  print(suffix)
  PY
  )"
  case "${NPA_COSMOS_AUGMENT_SOURCE}" in
    s3://*)
      aws_s3_cp "${NPA_COSMOS_AUGMENT_SOURCE}" "${source_local}"
      ;;
    http://*|https://*)
      curl -L "${NPA_COSMOS_AUGMENT_SOURCE}" -o "${source_local}"
      ;;
    *)
      cp "${NPA_COSMOS_AUGMENT_SOURCE}" "${source_local}"
      ;;
  esac

  spec_dir="${NPA_COSMOS_OUTPUT_DIR}/specs"
  mkdir -p "${spec_dir}"
  python - <<'PY'
  import json
  import os
  import subprocess
  from pathlib import Path

  control = os.environ["NPA_COSMOS_AUGMENT_CONTROL"].strip().lower()
  aliases = {"blur": "vis", "visual": "vis", "segmentation": "seg", "rgb": "vis"}
  control = aliases.get(control, control)
  if control not in {"edge", "vis", "depth", "seg"}:
      raise SystemExit(f"unsupported control modality: {control}")

  config_text = os.environ.get("NPA_COSMOS_AUGMENT_CONTROL_CONFIG", "").strip() or "{}"
  control_config = json.loads(config_text)
  if not isinstance(control_config, dict):
      raise SystemExit("NPA_COSMOS_AUGMENT_CONTROL_CONFIG must be a JSON object")

  source_local = Path(os.environ["NPA_COSMOS_OUTPUT_DIR"]) / "inputs" / ("source" + Path(os.environ["NPA_COSMOS_AUGMENT_SOURCE"].split("?", 1)[0]).suffix)
  if not source_local.exists():
      matches = sorted((Path(os.environ["NPA_COSMOS_OUTPUT_DIR"]) / "inputs").glob("source.*"))
      if not matches:
          raise SystemExit("source input was not downloaded")
      source_local = matches[0]

  variants = int(os.environ.get("NPA_COSMOS_AUGMENT_VARIANTS", "1"))
  spec_dir = Path(os.environ["NPA_COSMOS_OUTPUT_DIR"]) / "specs"
  input_dir = Path(os.environ["NPA_COSMOS_OUTPUT_DIR"]) / "inputs"
  for index in range(variants):
      block = dict(control_config)
      if control in {"depth", "seg"} and "control_path" not in block:
          raise SystemExit(f"{control} control requires control_config.control_path")
      control_path = str(block.get("control_path", ""))
      if control_path.startswith(("s3://", "http://", "https://")):
          suffix = Path(control_path.split("?", 1)[0]).suffix or ".mp4"
          local_control = input_dir / f"control-{index}{suffix}"
          if control_path.startswith("s3://"):
              cmd = ["aws"]
              endpoint = os.environ.get("AWS_ENDPOINT_URL", "")
              if endpoint:
                  cmd.extend(["--endpoint-url", endpoint])
              cmd.extend(["s3", "cp", control_path, str(local_control)])
              subprocess.run(cmd, check=True)
          else:
              subprocess.run(["curl", "-L", control_path, "-o", str(local_control)], check=True)
          block["control_path"] = str(local_control)
      block.setdefault("control_weight", 1.0)
      spec = {
          "name": f"npa_cosmos_augment_{index}",
          "seed": index,
          "prompt": os.environ["NPA_COSMOS_AUGMENT_PROMPT"],
          "video_path": str(source_local),
          "guidance": 3,
          control: block,
      }
      (spec_dir / f"augment-{index}.json").write_text(json.dumps(spec, indent=2), encoding="utf-8")
  PY

  model_args=()
  case "${NPA_COSMOS_AUGMENT_MODEL_SIZE}" in
    edge/distilled|transfer2.5-2b-distilled-edge)
      model_args+=(--model=edge/distilled)
      ;;
  esac

  for spec in "${spec_dir}"/augment-*.json; do
    variant_name="$(basename "${spec}" .json)"
    .venv/bin/python examples/inference.py \
      -i "${spec}" \
      -o "${NPA_COSMOS_OUTPUT_DIR}/generated/${variant_name}" \
      "${model_args[@]}"
  done

  python - <<'PY'
  import hashlib
  import json
  import os
  from pathlib import Path

  root = Path(os.environ["NPA_COSMOS_OUTPUT_DIR"])
  files = [
      str(path)
      for path in sorted((root / "generated").rglob("*"))
      if path.is_file() and path.suffix.lower() in {".mp4", ".jpg", ".jpeg", ".png", ".json"}
  ]
  media = [path for path in files if Path(path).suffix.lower() in {".mp4", ".jpg", ".jpeg", ".png"}]
  if not media:
      raise SystemExit("no generated media artifacts found")
  sha256 = {
      path: hashlib.sha256(Path(path).read_bytes()).hexdigest()
      for path in files
  }
  metadata = {
      "status": "ok",
      "workflow": "cosmos-augment",
      "backend": "cosmos-transfer2.5",
      "backend_reason": "Cosmos 3 controlled transfer is present in code but not yet exposed in public sample docs; Transfer 2.5 is the documented controlled-generation backend.",
      "model": os.environ["NPA_COSMOS_TRANSFER_MODEL_ID"],
      "control": os.environ["NPA_COSMOS_AUGMENT_CONTROL"],
      "guardrails": "on",
      "attribution": os.environ["NPA_COSMOS_ATTRIBUTION"],
      "artifacts": files,
      "sha256": sha256,
  }
  (root / "result.json").write_text(json.dumps(metadata, indent=2), encoding="utf-8")
  print(json.dumps(metadata, sort_keys=True))
  PY

  if [ -n "${NPA_COSMOS_AUGMENT_OUTPUT}" ]; then
    case "${NPA_COSMOS_AUGMENT_OUTPUT}" in
      s3://*)
        aws_s3_cp --recursive "${NPA_COSMOS_OUTPUT_DIR}/generated" "${NPA_COSMOS_AUGMENT_OUTPUT%/}/generated/"
        aws_s3_cp "${NPA_COSMOS_OUTPUT_DIR}/result.json" "${NPA_COSMOS_AUGMENT_OUTPUT%/}/result.json"
        ;;
      *)
        mkdir -p "${NPA_COSMOS_AUGMENT_OUTPUT}"
        cp -R "${NPA_COSMOS_OUTPUT_DIR}/generated" "${NPA_COSMOS_AUGMENT_OUTPUT}/"
        cp "${NPA_COSMOS_OUTPUT_DIR}/result.json" "${NPA_COSMOS_AUGMENT_OUTPUT}/result.json"
        ;;
    esac
  fi
  NPA_COSMOS_CONTAINER
  chmod +x "${job_dir}/run-container.sh"

  "${docker_cmd[@]}" run --rm --gpus all --ipc=host --network host \
    --env-file "${env_file}" \
    -v "${job_dir}:${job_dir}:ro" \
    "${NPA_COSMOS2_TRANSFER_IMAGE}" -lc "bash ${job_dir}/run-container.sh"
