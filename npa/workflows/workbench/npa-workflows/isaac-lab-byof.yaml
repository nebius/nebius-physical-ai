apiVersion: npa.workflow/v0.0.1
kind: Workflow
metadata:
  name: isaac-lab-byof
  description: >
    Generic BYOF Isaac Lab workflow: build/push an OSS repo image and submit a
    SkyPilot RL training smoke on live Kubernetes infra.
config:
  bucket: example-bucket
  repo_url: "<repo-url>"
  repo_ref: "<repo-ref>"
  resource_profile_yaml: "<resource-profile.yaml>"
  task: "<task>"
  iterations: 1
  wait_timeout: 21600
  poll_interval: 60

  output_root: s3://{{config.bucket}}/isaac-lab-byof/{{run.id}}
  summary_uri: "{{config.output_root}}/npa_isaac_lab_train_summary.json"
  checkpoint_uri: "{{config.output_root}}/npa_isaac_lab_checkpoint.pt"
resources:
  gpu:
    cloud: kubernetes
    accelerators: RTXPRO6000:1
initial: byof-train
states:
  byof-train:
    description: >
      Build a BYOF Isaac Lab image from config.repo_url and run RL train on live infra.
    toolRef: workbench.isaac_lab.byof_repo
    resources: gpu
    outputs:
      - uri: "{{config.summary_uri}}"
        schema: npa.workbench.isaac_lab.train_summary.v1
      - uri: "{{config.checkpoint_uri}}"
        schema: npa.workbench.isaac_lab.checkpoint.v1
    terminal: true
