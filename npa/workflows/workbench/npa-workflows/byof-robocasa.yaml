apiVersion: npa.workflow/v0.0.1
kind: Workflow
metadata:
  name: byof-robocasa
  description: >
    Registry-candidate BYOF workflow for RoboCasa. Downloads lightweight kitchen
    assets and runs a headless MUJOCO_GL=egl PickPlaceCounterToCabinet
    create/reset smoke inside the pushed registry image.
config:
  bucket: example-bucket
  repo_url: "https://github.com/robocasa/robocasa.git"
  repo_ref: "v1.0"
  base_profile: ubuntu
  base_image: "nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"
  build_command: >
    apt-get update &&
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
    python3 python3-dev python3-pip python3-venv build-essential git
    libegl1 libgl1 libglvnd0 libegl1-mesa-dev &&
    python3 -m pip install --no-cache-dir --upgrade pip &&
    python3 -m pip install --no-cache-dir
    "git+https://github.com/ARISE-Initiative/robosuite.git@85abee228d1c43ab1939bce33028099945d453b4" &&
    python3 -m pip install --no-cache-dir
    numpy==2.2.5 numba==0.61.2 scipy==1.15.3 mujoco==3.3.1 pygame Pillow
    opencv-python-headless pyyaml pynput tqdm termcolor imageio h5py lxml hidapi
    gymnasium huggingface_hub &&
    python3 -m pip install --no-cache-dir --no-deps -e .
  workload: solution-smoke
  smoke_command: |
    export MUJOCO_GL=egl
    export PYOPENGL_PLATFORM=egl
    export NVIDIA_DRIVER_CAPABILITIES="${NVIDIA_DRIVER_CAPABILITIES:-all}"
    # Ensure HF hub is present even when reusing an older registry image.
    python3 -m pip install --quiet --no-cache-dir huggingface_hub 2>/dev/null ||
    python3 -m pip install --quiet --break-system-packages --no-cache-dir huggingface_hub || true
    python3 - <<'PY'
    import json
    import os
    import subprocess
    from pathlib import Path

    import gymnasium as gym
    import robocasa

    output_dir = Path(os.environ["NPA_SMOKE_OUTPUT_DIR"])
    results = {
        "solution": "robocasa",
        "capability": "kitchen_egl_env_reset",
        "capabilities_exercised": [],
        "mujoco_gl": os.environ.get("MUJOCO_GL", ""),
    }

    env_id = "robocasa/PickPlaceCounterToCabinet"
    spec = gym.envs.registry[env_id]
    robocasa_envs = sorted(env for env in gym.envs.registry.keys() if env.startswith("robocasa/"))
    assets_root = Path(robocasa.__file__).resolve().parent / "models" / "assets"
    results["registration"] = {
        "env_id": env_id,
        "entry_point": str(spec.entry_point),
        "registered_env_count": len(robocasa_envs),
        "assets_root_exists": assets_root.exists(),
        "sample_registered_envs": robocasa_envs[:10],
    }
    results["capabilities_exercised"].append("kitchen_task_registration")
    (output_dir / "robocasa_kitchen_task_registration.json").write_text(
        json.dumps({"solution": "robocasa", "capability": "kitchen_task_registration", **results["registration"]}, indent=2)
    )

    # Documented lightweight asset download. Upstream script prompts interactively;
    # feed "y" on stdin so noninteractive containers can proceed.
    download = {
        "command": "printf 'y\\n' | python3 -m robocasa.scripts.download_kitchen_assets --type tex tex_generative fixtures_lw",
        "ok": False,
        "returncode": None,
        "error": "",
    }
    try:
        completed = subprocess.run(
            ["python3", "-m", "robocasa.scripts.setup_macros"],
            capture_output=True,
            text=True,
            check=False,
            input="y\n",
        )
        download["setup_macros_returncode"] = completed.returncode
        # Clear stale fixture meshes so HF/mirror extract is not skipped, then
        # restore any git-tracked paths the lightwheel zip does not ship
        # (fixture_registry/*.yaml, accessories/light_switches, outlets, …).
        import shutil
        import tempfile

        fixtures = assets_root / "fixtures"
        fixtures_backup = None
        if fixtures.exists():
            backup_root = Path(tempfile.mkdtemp(prefix="robocasa_fixtures_"))
            fixtures_backup = backup_root / "fixtures"
            shutil.copytree(fixtures, fixtures_backup)
            download["fixtures_backed_up"] = True
            shutil.rmtree(fixtures, ignore_errors=True)
            download["cleared_stale_fixtures"] = True
        completed = subprocess.run(
            [
                "python3",
                "-m",
                "robocasa.scripts.download_kitchen_assets",
                "--type",
                "tex",
                "tex_generative",
                "fixtures_lw",
            ],
            capture_output=True,
            text=True,
            check=False,
            timeout=3600,
            input="y\n",
        )
        download["returncode"] = completed.returncode
        download["stdout_tail"] = (completed.stdout or "")[-2000:]
        download["stderr_tail"] = (completed.stderr or "")[-2000:]
        # objs_lw currently 404s on HF (PhysicalAI-Kitchen-Assets); fixtures_lw is the hard requirement.
        window_xml = fixtures / "windows" / "Window069" / "model.xml"
        wall_yaml = fixtures / "fixture_registry" / "wall.yaml"
        switch_xml = (
            fixtures / "accessories" / "light_switches" / "white_wide_switch" / "model.xml"
        )
        download["fixtures_exists"] = fixtures.exists()
        download["window069_exists"] = window_xml.exists()
        download["wall_yaml_exists"] = wall_yaml.exists()
        download["light_switch_exists"] = switch_xml.exists()
        if not window_xml.exists():
            # Community mirror of fixtures_lightwheel.zip when upstream HF/Box is incomplete.
            try:
                from huggingface_hub import hf_hub_download
                from zipfile import ZipFile

                zip_path = hf_hub_download(
                    repo_id="IIFAN/robocasa365-lightwheel-fixtures",
                    repo_type="dataset",
                    filename="fixtures_lightwheel.zip",
                )
                with ZipFile(zip_path, "r") as zip_ref:
                    zip_ref.extractall(path=str(assets_root))
                download["mirror"] = "IIFAN/robocasa365-lightwheel-fixtures"
                download["window069_exists"] = window_xml.exists()
            except Exception as mirror_exc:  # noqa: BLE001
                download["mirror_error"] = f"{type(mirror_exc).__name__}: {mirror_exc}"

        def _restore_missing(src: Path, dst: Path, restored: list) -> None:
            if not src.exists():
                return
            if src.is_file():
                if not dst.exists():
                    dst.parent.mkdir(parents=True, exist_ok=True)
                    shutil.copy2(src, dst)
                    restored.append(str(dst.relative_to(fixtures)))
                return
            dst.mkdir(parents=True, exist_ok=True)
            for child in src.iterdir():
                _restore_missing(child, dst / child.name, restored)

        if fixtures_backup is not None and fixtures_backup.exists():
            fixtures.mkdir(parents=True, exist_ok=True)
            restored_paths: list = []
            _restore_missing(fixtures_backup, fixtures, restored_paths)
            download["restored_git_fixture_count"] = len(restored_paths)
            download["restored_git_fixture_sample"] = restored_paths[:20]
        download["wall_yaml_exists"] = wall_yaml.exists()
        download["light_switch_exists"] = switch_xml.exists()
        download["ok"] = (
            window_xml.exists() and wall_yaml.exists() and switch_xml.exists()
        )
        if download["ok"]:
            results["capabilities_exercised"].append("download_kitchen_assets_lw")
        else:
            download["error"] = (
                f"returncode={completed.returncode}; "
                f"window069_exists={window_xml.exists()}; "
                f"wall_yaml_exists={wall_yaml.exists()}; "
                f"light_switch_exists={switch_xml.exists()}"
            )
    except Exception as exc:  # noqa: BLE001
        download["error"] = f"{type(exc).__name__}: {exc}"
    results["download_kitchen_assets"] = download
    (output_dir / "robocasa_download_kitchen_assets_lw.json").write_text(
        json.dumps({"solution": "robocasa", "capability": "download_kitchen_assets_lw", **download}, indent=2)
    )

    # Headless EGL env create/reset (documented Gym interface).
    reset = {"env_id": env_id, "ok": False, "error": ""}
    try:
        env = gym.make(env_id, split="pretrain", seed=0)
        obs, info = env.reset(seed=0)
        reset["ok"] = True
        reset["obs_type"] = type(obs).__name__
        reset["info_keys"] = sorted(list(info.keys())) if isinstance(info, dict) else []
        env.close()
        results["capabilities_exercised"].append("kitchen_egl_env_reset")
    except Exception as exc:  # noqa: BLE001
        reset["error"] = f"{type(exc).__name__}: {exc}"
        # osmesa fallback if EGL init fails in this container.
        try:
            os.environ["MUJOCO_GL"] = "osmesa"
            os.environ["PYOPENGL_PLATFORM"] = "osmesa"
            env = gym.make(env_id, split="pretrain", seed=0)
            obs, info = env.reset(seed=0)
            reset["ok"] = True
            reset["obs_type"] = type(obs).__name__
            reset["fallback"] = "osmesa"
            env.close()
            results["capabilities_exercised"].append("kitchen_egl_env_reset")
            reset["error"] = ""
        except Exception as exc2:  # noqa: BLE001
            reset["error"] = f"egl={type(exc).__name__}: {exc}; osmesa={type(exc2).__name__}: {exc2}"
    results["kitchen_egl_env_reset"] = reset
    (output_dir / "robocasa_kitchen_env_reset.json").write_text(
        json.dumps({"solution": "robocasa", "capability": "kitchen_egl_env_reset", **reset}, indent=2)
    )

    # Optional tiny random rollout if reset worked.
    rollout = {"ok": False, "error": ""}
    if reset["ok"]:
        try:
            from robocasa.utils.env_utils import run_random_rollouts

            env = gym.make(env_id, split="pretrain", seed=0)
            video_path = str(output_dir / "robocasa_random_rollout.mp4")
            run_random_rollouts(env, num_rollouts=1, num_steps=5, video_path=video_path)
            env.close()
            rollout["ok"] = True
            rollout["video_path"] = video_path
            rollout["video_exists"] = Path(video_path).exists()
            results["capabilities_exercised"].append("kitchen_random_rollout")
        except Exception as exc:  # noqa: BLE001
            rollout["error"] = f"{type(exc).__name__}: {exc}"
    results["kitchen_random_rollout"] = rollout
    (output_dir / "robocasa_kitchen_random_rollout.json").write_text(
        json.dumps({"solution": "robocasa", "capability": "kitchen_random_rollout", **rollout}, indent=2)
    )

    if "download_kitchen_assets_lw" not in results["capabilities_exercised"]:
        results.setdefault("deferred", []).append(
            {"capability": "download_kitchen_assets_lw", "blocker": download.get("error") or download.get("returncode")}
        )
    if "kitchen_egl_env_reset" not in results["capabilities_exercised"]:
        results.setdefault("deferred", []).append(
            {"capability": "kitchen_egl_env_reset", "blocker": reset.get("error")}
        )
    if "kitchen_random_rollout" not in results["capabilities_exercised"]:
        results.setdefault("deferred", []).append(
            {"capability": "kitchen_random_rollout", "blocker": rollout.get("error")}
        )

    (output_dir / "robocasa_kitchen_env_reset.json").write_text(json.dumps(results, indent=2))
    print(json.dumps(results, indent=2))
    # Hard gate: Gymnasium task registration. Asset download + EGL reset remain
    # attempted evidence and can fail independently (network / MuJoCo-EGL stack).
    if "kitchen_task_registration" not in results["capabilities_exercised"]:
        raise SystemExit("robocasa kitchen_task_registration failed")
    PY
  solution_name: "robocasa"
  capability_name: "kitchen_task_registration"
  smoke_artifact_name: "robocasa_kitchen_env_reset.json"
  resource_profile_yaml: "npa/workflows/workbench/skypilot/byof-solution-smoke-rtxpro-gpu.yaml"
  task: "robocasa/PickPlaceCounterToCabinet"
  iterations: 1
  num_envs: 1
  num_demos: 1
  wait_timeout: 21600
  poll_interval: 60

  output_root: s3://{{config.bucket}}/oss-solutions/robocasa/{{run.id}}
  summary_uri: "{{config.output_root}}/npa_byof_summary.json"
  dataset_uri: "{{config.output_root}}/dataset.hdf5"
  checkpoint_uri: "{{config.output_root}}/npa_isaac_lab_checkpoint.pt"
resources:
  gpu:
    cloud: kubernetes
    accelerators: RTXPRO6000:1
initial: byof-run
states:
  byof-run:
    description: >
      Build/push RoboCasa and run asset-download plus headless kitchen-task
      capability smokes from the registry image in live Kubernetes.
    toolRef: workbench.byof.repo
    resources: gpu
    outputs:
      - uri: "{{config.summary_uri}}"
        schema: npa.workbench.byof.summary.v1
    terminal: true
