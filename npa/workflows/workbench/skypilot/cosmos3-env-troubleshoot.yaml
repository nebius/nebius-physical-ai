# Cosmos3 environment diagnostics.
#
# NPA-authored by reference to NVIDIA cosmos-framework
# .agents/skills/cosmos3-env-troubleshoot/SKILL.md.
name: cosmos3-env-troubleshoot
resources:
  cloud: kubernetes
  cpus: 4+
  memory: 16+
  disk_size: 128
envs:
  NPA_COSMOS3_DIAGNOSTICS_JSON: "/tmp/npa-cosmos3-diagnostics/diagnostics.json"
  NPA_COSMOS3_OUTPUT_S3_URI: ""
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"
setup: |
  set -euo pipefail
  if command -v apt-get >/dev/null 2>&1; then
    export DEBIAN_FRONTEND=noninteractive
    apt-get update
    apt-get install -y --no-install-recommends ca-certificates curl git python3-pip
  fi
run: |
  set -euo pipefail
  mkdir -p "$(dirname "${NPA_COSMOS3_DIAGNOSTICS_JSON}")"
  python3 - <<'PY'
  import json
  import os
  import platform
  import shutil
  import subprocess
  from pathlib import Path

  def run(command):
      if shutil.which(command[0]) is None:
          return {"command": command, "returncode": 127, "stdout": "", "stderr": "not found"}
      result = subprocess.run(command, text=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=False)
      return {
          "command": command,
          "returncode": result.returncode,
          "stdout": result.stdout[-4000:],
          "stderr": result.stderr[-4000:],
      }

  checks = {
      "uname": run(["uname", "-a"]),
      "os_release": run(["bash", "-lc", "cat /etc/os-release | head -5"]),
      "python": run(["python3", "--version"]),
      "which_python": run(["which", "python3"]),
      "nvidia_smi": run(["nvidia-smi"]),
      "pip_head": run(["bash", "-lc", "python3 -m pip list | head -20"]),
  }
  try:
      import torch
      checks["torch"] = {
          "returncode": 0,
          "version": torch.__version__,
          "cuda": getattr(torch.version, "cuda", None),
          "cuda_available": torch.cuda.is_available(),
      }
  except Exception as exc:
      checks["torch"] = {"returncode": 1, "error": f"{type(exc).__name__}: {exc}"}

  payload = {
      "status": "ok",
      "platform": platform.platform(),
      "ld_library_path_set": bool(os.environ.get("LD_LIBRARY_PATH")),
      "checks": checks,
  }
  output = Path(os.environ["NPA_COSMOS3_DIAGNOSTICS_JSON"])
  output.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
  print(json.dumps(payload, sort_keys=True))
  PY

  if [ -n "${NPA_COSMOS3_OUTPUT_S3_URI}" ]; then
    if ! command -v aws >/dev/null 2>&1; then
      python3 -m pip install --user "awscli>=1.32"
    fi
    aws s3 cp "${NPA_COSMOS3_DIAGNOSTICS_JSON}" "${NPA_COSMOS3_OUTPUT_S3_URI%/}/diagnostics.json"
  fi
